<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro - FioCerto</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; 
            background-color: #060b13; 
            color: #ffd700; 
            font-family: 'Orbitron', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            width: 100vw; height: 100vh; overflow: hidden; 
        }

        /* --- TELA DE ENTRADA (SPLASH SCREEN) --- */
        #tela-entrada { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background-color: #060b13; z-index: 1000; 
            display: flex; align-items: center; justify-content: center; 
            transition: opacity 0.5s ease, visibility 0.5s; 
        }
        .moldura-entrada { 
            width: 80%; max-width: 900px; height: 70%; max-height: 450px; 
            border: 3px solid #00f0ff; border-radius: 25px; 
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.4), inset 0 0 20px rgba(0, 240, 255, 0.1); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 20px; text-align: center; 
        }
        .intro-entrada { color: #008b8b; font-size: 45px; font-weight: 400; text-transform: uppercase; margin-bottom: 10px; }
        .titulo-entrada { color: #00f0ff; font-size: 32px; text-transform: uppercase; text-shadow: 0 0 25px rgba(0, 240, 255, 0.6); margin-bottom: 20px; }
        .subtitulo-entrada { color: #00f0ff; font-size: 18px; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 40px; }
        .creditos-entrada { color: #445566; font-size: 13px; margin-bottom: 30px; }
        
        .btn-iniciar-lab { 
            background: transparent; border: 2px solid #00f0ff; border-radius: 50px; 
            color: #00f0ff; font-size: 16px; font-weight: bold; text-transform: uppercase; 
            padding: 12px 35px; cursor: pointer; letter-spacing: 1px; 
            transition: all 0.3s ease; animation: pulsarBotao 1.5s infinite; 
        }
        @keyframes pulsarBotao { 0%, 100% { opacity: 0.6; box-shadow: 0 0 10px rgba(0,240,255,0.2); } 50% { opacity: 1; box-shadow: 0 0 25px rgba(0,240,255,0.6); } }

        /* --- PAINEL DE STATUS --- */
        #titulo-sistema { color: #00f0ff; font-size: 32px; margin-top: 20px; text-shadow: 0 0 15px rgba(0, 240, 255, 0.6); text-transform: uppercase; }
        #painel-status { 
            width: 90%; max-width: 1000px; margin: 15px auto; padding: 15px; 
            background: rgba(4, 10, 20, 0.9); border: 1px solid #16222f; border-radius: 12px; 
            text-align: center; min-height: 70px; display: flex; align-items: center; justify-content: center;
        }
        #instrucao { color: #ffd700; font-size: 18px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .tag-circuito { color: #ff3333; font-weight: 900; }
        .tag-rede { color: #00ff00; font-weight: 900; }

        /* --- SIMULADOR --- */
        #projeto-container { 
            position: relative; width: 1000px; height: 600px; 
            background: url('ambiente.jpg') no-repeat center center; 
            background-size: contain; border: 2px solid #1a2a44; 
        }
        
        .camada-cabo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .ponto-conexao { 
            position: absolute; width: 22px; height: 22px; border-radius: 50%; 
            border: 2px solid #fff; z-index: 150; cursor: pointer; 
            display: none; transform: translate(-50%, -50%); 
        }
        .ponto-verde { background: #00ff00 !important; box-shadow: 0 0 15px #00ff00; }

        .alavanca, .tecla { position: absolute; z-index: 110; cursor: pointer; }
        .lampada-acesa { position: absolute; z-index: 105; pointer-events: none; display: none; }
        
        /* HOTSPOTS COM LINHA AMARELA */
        .hotspot {
            position: absolute; cursor: help; z-index: 100;
            border: 1px solid transparent; transition: all 0.3s;
        }
        .hotspot:hover {
            border: 1px solid rgba(255, 255, 0, 0.6);
            background: rgba(255, 255, 0, 0.05);
        }

        #tooltip {
            position: fixed; background: rgba(255, 255, 0, 0.95);
            color: #060b13; padding: 6px 12px; border-radius: 4px;
            font-size: 12px; font-weight: bold; pointer-events: none;
            display: none; z-index: 2000; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="tela-entrada">
        <div class="moldura-entrada">
            <div class="intro-entrada">Laboratório SMT Pro</div>
            <h1 class="titulo-entrada">INSTALAÇÃO DE LÂMPADAS EM PARALELO</h1>
            <h2 class="subtitulo-entrada">SISTEMA FioCerto - NBR 5410</h2>
            <div class="creditos-entrada">© Desenvolvido por Ivan Santos - 2026</div>
            <button class="btn-iniciar-lab" onclick="iniciarLaboratorio()">Clique para iniciar o Laboratório</button>
        </div>
    </div>

    <div id="titulo-sistema">Laboratório SMT Pro</div>
    <div id="painel-status"><span id="instrucao">AGUARDANDO INÍCIO...</span></div>

    <div id="projeto-container">
        <div class="hotspot" style="top: 15%; left: 12%; width: 45px; height: 150px;" onmouseover="showTip('DISJUNTOR GERAL')" onmouseout="hideTip()"></div>
        <div class="hotspot" style="top: 15%; left: 19.5%; width: 90px; height: 161px;" onmouseover="showTip('DISPOSITIVO DR')" onmouseout="hideTip()"></div>
        
        <div id="area-fios">
            <img id="REDEFASE" class="camada-cabo">
            <img id="REDENEUTRO" class="camada-cabo">
            <img id="FASEINT" class="camada-cabo">
            <img id="RETORNO1" class="camada-cabo">
            <img id="RETORNO2" class="camada-cabo">
            <img id="NEUTROL1" class="camada-cabo">
            <img id="NEUTROL2" class="camada-cabo">
        </div>

        <img id="al-dg" src="al_dg_off.png" class="alavanca" style="top: 27.6%; left: 12%; width: 39px;" onclick="toggleDG()">
        <img id="al-dr" src="al_dr_off.png" class="alavanca" style="top: 30%; left: 23.5%; width: 55px;" onclick="toggleDR()">
        
        <img id="lamp1-on" src="lamp_on.png" class="lampada-acesa" style="top: 60.5%; left: 66.6%; width: 170px;">
        <img id="lamp2-on" src="lamp_on.png" class="lampada-acesa" style="top: 60.5%; left: 82.9%; width: 170px;">

        <div id="ponto-A" class="ponto-conexao" onclick="cliquePonto('A')"></div>
        <div id="ponto-B" class="ponto-conexao" onclick="cliquePonto('B')"></div>
    </div>

    <div id="tooltip"></div>

    <script>
        const etapas = [
            { id: 'REDEFASE', cor: 'red', msg: 'REDE: Conecte a FASE de entrada no Disjuntor Geral', a: {t:38, l:26}, b: {t:17, l:99} },
            { id: 'REDENEUTRO', cor: 'blue', msg: 'REDE: Conecte o NEUTRO de entrada no Barramento', a: {t:35, l:44}, b: {t:14, l:99} },
            { id: 'FASEINT', cor: 'red', msg: 'CIRCUITO: Leve a FASE do disjuntor até o interruptor', a: {t:19, l:60}, b: {t:67, l:58} }
        ];

        let etapaAtual = 0;
        let pA_ok = false;

        function iniciarLaboratorio() {
            document.getElementById('tela-entrada').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('tela-entrada').style.visibility = "hidden";
                carregarEtapa();
            }, 500);
        }

        function formatarInstrucao(texto) {
            return texto.replace(/REDE:/g, '<span class="tag-rede">REDE:</span>')
                        .replace(/CIRCUITO:/g, '<span class="tag-circuito">CIRCUITO:</span>');
        }

        function carregarEtapa() {
            if (etapaAtual >= etapas.length) {
                document.getElementById('instrucao').innerHTML = "MONTAGEM CONCLUÍDA! TESTE O SISTEMA.";
                return;
            }
            const info = etapas[etapaAtual];
            document.getElementById('instrucao').innerHTML = formatarInstrucao(info.msg);
            
            const pA = document.getElementById('ponto-A');
            pA.style.top = info.a.t + "%"; pA.style.left = info.a.l + "%";
            pA.style.backgroundColor = info.cor;
            pA.style.display = "block";
            pA.classList.remove('ponto-verde');

            const pB = document.getElementById('ponto-B');
            pB.style.top = info.b.t + "%"; pB.style.left = info.b.l + "%";
            pB.style.backgroundColor = info.cor;
            pB.style.display = "none";
            pB.classList.remove('ponto-verde');
            pA_ok = false;
        }

        function cliquePonto(tipo) {
            if (tipo === 'A') {
                pA_ok = true;
                document.getElementById('ponto-A').classList.add('ponto-verde');
                document.getElementById('ponto-B').style.display = "block";
            } else if (tipo === 'B' && pA_ok) {
                document.getElementById('ponto-B').classList.add('ponto-verde');
                // Aqui entraria a lógica de animar o cabo (processarCabo)
                etapaAtual++;
                setTimeout(carregarEtapa, 1000);
            }
        }

        // Funções de UI (Tooltip)
        const tip = document.getElementById('tooltip');
        function showTip(t) { tip.innerText = t; tip.style.display = 'block'; }
        function hideTip() { tip.style.display = 'none'; }
        document.addEventListener('mousemove', (e) => {
            tip.style.left = (e.clientX + 15) + 'px';
            tip.style.top = (e.clientY - 15) + 'px';
        });

        function toggleDG() { /* Lógica de energia */ }
        function toggleDR() { /* Lógica de energia */ }
    </script>
</body>
</html>
