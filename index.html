<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SMT Pro - FioCerto</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html, body { margin: 0; padding: 0; background: #060b13; width: 100%; height: 100vh; overflow: hidden; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        #conteudo-lab { display: flex; flex-direction: column; align-items: center; width: 100%; padding-top: 30px; }
        
        #container-simulador { 
            position: relative; 
            width: 1000px; 
            height: 600px; 
            background: #060b13;
            overflow: hidden;
        }

        #canvas-simulador {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            background: transparent;
        }

        /* MUDANÇAS AQUI */
        .componente { 
            position: absolute; 
            z-index: 10; 
            cursor: pointer; 
            border: 0 !important;
            outline: none !important; /* Remove outline de foco */
            background: transparent; /* Remove fundo branco se não carregar */
            -webkit-user-drag: none; /* Remove fantasma ao arrastar */
            user-select: none;
        }
        
        /* Remove outline quando clica/foca */
        .componente:focus, .componente:active {
            outline: none !important;
            border: 0 !important;
        }
    </style>
</head>
<body>

    <div id="conteudo-lab">
        <div id="container-simulador">
            <canvas id="canvas-simulador" width="1000" height="600"></canvas>

            <img id="al-dg" src="al_dg_off.png" class="componente" style="top: 27.6%; left: 12%; width: 39px;" onclick="toggleDG()" onerror="this.style.display='none'">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas-simulador');
        const ctx = canvas.getContext('2d');

        const imgAmbiente = new Image();
        imgAmbiente.src = 'ambiente.jpg';
        imgAmbiente.onload = () => {
            ctx.drawImage(imgAmbiente, 0, 0, 1000, 600);
        };

        function desenharCabo(caminhoFrame) {
            const frame = new Image();
            frame.src = caminhoFrame;
            frame.onload = () => {
                ctx.clearRect(0, 0, 1000, 600);
                ctx.drawImage(imgAmbiente, 0, 0, 1000, 600);
                ctx.drawImage(frame, 0, 0, 1000, 600);
            };
        }

        let dgLigado = false;
        function toggleDG() {
            dgLigado = !dgLigado;
            document.getElementById('al-dg').src = dgLigado ? 'al_dg_on.png' : 'al_dg_off.png';
        }
    </script>
</body>
</html>
