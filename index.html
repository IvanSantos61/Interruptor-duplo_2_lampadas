<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SMT Pro - FioCerto</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html, body { margin: 0; padding: 0; background: #060b13; width: 100%; height: 100vh; overflow: hidden; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        #conteudo-lab { display: flex; flex-direction: column; align-items: center; width: 100%; padding-top: 30px; }
        
        /* O Container agora é apenas um limitador de espaço */
        #container-simulador { 
            position: relative; 
            width: 1000px; 
            height: 600px; 
            background: #060b13; /* Fundo sólido para garantir o Dark */
            overflow: hidden;
        }

        /* O FUNDO E OS CABOS SÃO DESENHADOS AQUI. 
           Canvas não possui bordas padrão nem ícones de erro. */
        #canvas-simulador {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            background: transparent;
        }

        /* Os componentes interativos ficam por cima (z-index 10) */
        .componente { position: absolute; z-index: 10; cursor: pointer; border: none !important; }
    </style>
</head>
<body>

    <div id="conteudo-lab">
        <div id="container-simulador">
            <canvas id="canvas-simulador" width="1000" height="600"></canvas>

            <img id="al-dg" src="al_dg_off.png" class="componente" style="top: 27.6%; left: 12%; width: 39px;" onclick="toggleDG()">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas-simulador');
        const ctx = canvas.getContext('2d');

        // Carrega a imagem de fundo
        const imgAmbiente = new Image();
        imgAmbiente.src = 'ambiente.jpg';
        imgAmbiente.onload = () => {
            ctx.drawImage(imgAmbiente, 0, 0, 1000, 600);
        };

        // Função para desenhar os cabos sem usar a tag <img> no HTML
        function desenharCabo(caminhoFrame) {
            const frame = new Image();
            frame.src = caminhoFrame;
            frame.onload = () => {
                // Redesenha o fundo e depois o cabo por cima, limpando qualquer artefato
                ctx.clearRect(0, 0, 1000, 600);
                ctx.drawImage(imgAmbiente, 0, 0, 1000, 600);
                ctx.drawImage(frame, 0, 0, 1000, 600);
            };
        }

        let dgLigado = false;
        function toggleDG() {
            dgLigado = !dgLigado;
            document.getElementById('al-dg').src = dgLigado ? 'al_dg_on.png' : 'al_dg_off.png';
            // Exemplo de chamada: desenharCabo('REDEFASE/quadro001.png');
        }
    </script>
</body>
</html>
