<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SMT Pro - FioCerto</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* RESET TOTAL DE BORDAS E MOLDURAS */
        * { margin: 0; padding: 0; box-sizing: border-box; border: none !important; outline: none !important; box-shadow: none !important; }
        html, body { background: #060b13; width: 100%; height: 100vh; overflow: hidden; color: white; font-family: 'Orbitron', sans-serif; }
        body { display: flex; flex-direction: column; align-items: center; }

        /* TELA DE INÍCIO */
        #splash-screen { position: fixed; inset: 0; background: #060b13; z-index: 5000; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .moldura-splash { text-align: center; background: #060b13; }
        .splash-h1 { color: #00f0ff; font-size: 45px; letter-spacing: 5px; margin-bottom: 10px; }
        .splash-h2 { color: #00f0ff; font-size: 24px; margin-bottom: 50px; }
        
        .btn-iniciar { 
            background: transparent; border: 2px solid #00f0ff !important; border-radius: 50px;
            color: #00f0ff; font-size: 15px; padding: 15px 40px; cursor: pointer; font-family: 'Orbitron';
        }

        /* SIMULADOR */
        #conteudo-lab { display: none; flex-direction: column; align-items: center; width: 100%; padding-top: 20px; }
        .titulo-principal { color: #00f0ff; font-size: 35px; margin-bottom: 20px; }

        #painel-status { width: 850px; height: 80px; background: #060b13; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        #msg { color: #ff8c00; font-size: 16px; font-weight: bold; text-transform: uppercase; }

        #container-simulador { 
            position: relative; width: 1000px; height: 600px; 
            background: url('ambiente.jpg') no-repeat center center; background-size: contain; 
        }

        /* BOTÕES DE AÇÃO */
        .btn-acao {
            position: absolute; width: 140px; padding: 10px; border-radius: 20px;
            font-family: 'Orbitron'; font-size: 12px; font-weight: bold;
            cursor: pointer; text-transform: uppercase; color: white; z-index: 500;
        }
        .btn-ajuda { background: #1a2a44; border: 1px solid #00f0ff !important; opacity: 0.8; }
        .btn-reiniciar { background: #cc0000; }

        /* CABOS E COMPONENTES */
        .camada-cabo { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        .ponto-conexao { position: absolute; width: 22px; height: 22px; border-radius: 50%; border: 2px solid #fff !important; z-index: 150; cursor: pointer; display: none; transform: translate(-50%, -50%); }
        .ponto-verde { background: #00ff00 !important; }
        .alavanca, .tecla { position: absolute; z-index: 110; cursor: pointer; }
        .lampada-acesa { position: absolute; z-index: 105; pointer-events: none; display: none; }
        .conector { position: absolute; z-index: 115; display: none; }
        
        #tooltip { position: fixed; background: rgba(255, 255, 0, 0.9); color: #000; padding: 5px 10px; border-radius: 4px; font-size: 12px; display: none; z-index: 2000; }
    </style>
</head>
<body>

    <div id="tooltip"></div>

    <div id="splash-screen">
        <div class="moldura-splash">
            <h1 class="splash-h1">LABORATÓRIO SMT PRO</h1>
            <h2 class="splash-h2">INTERRUPTOR SIMPLES - 2 LÂMPADAS</h2>
            <button class="btn-iniciar" onclick="iniciarLaboratorio()">INICIAR LABORATÓRIO</button>
        </div>
    </div>

    <div id="conteudo-lab">
        <h1 class="titulo-principal">LABORATÓRIO SMT PRO</h1>

        <div id="painel-status">
            <div id="msg">AGUARDANDO INÍCIO...</div>
        </div>

        <div id="container-simulador">
            <button class="btn-acao btn-ajuda" style="top: 480px; left: 25px;">AJUDA</button>
            <button class="btn-acao btn-reiniciar" style="top: 535px; left: 25px;" onclick="reiniciarFluxo()">REINICIAR</button>

            <img id="REDEFASE" class="camada-cabo"> <img id="REDENEUTRO" class="camada-cabo">
            <img id="FASEINT" class="camada-cabo"> <img id="JUMP" class="camada-cabo">
            <img id="RETORNO1" class="camada-cabo"> <img id="RETORNO2" class="camada-cabo">
            <img id="NEUTROL1" class="camada-cabo"> <img id="NEUTROL2" class="camada-cabo">

            <img id="al-dg" src="al_dg_off.png" class="alavanca" style="top: 27.6%; left: 12%; width: 39px;" onclick="toggleDG()">
            <img id="al-dr" src="al_dr_off.png" class="alavanca" style="top: 30%; left: 23.5%; width: 55px;" onclick="toggleDR()">
            <img id="tecla-l1" src="intum_off.png" class="tecla" style="top: 64.5%; left: 57.5%; width: 65px;" onclick="toggleTecla(1)">
            <img id="tecla-l2" src="intdois_off.png" class="tecla" style="top: 68.9%; left: 57.5%; width: 65px;" onclick="toggleTecla(2)">

            <img id="lamp1-on" src="lamp_on.png" class="lampada-acesa" style="top: 60.5%; left: 66.6%; width: 170px;">
            <img id="lamp2-on" src="lamp_on.png" class="lampada-acesa" style="top: 60.5%; left: 82.9%; width: 170px;">

            <div id="ponto-A" class="ponto-conexao" onclick="cliquePonto('A')"></div>
            <div id="ponto-B" class="ponto-conexao" onclick="cliquePonto('B')"></div>
        </div>
    </div>

    <script>
        const coordenadas = [
            { id: 'REDEFASE',   cor: 'red',    a: { top: 38, left: 26 }, b: { top: 17, left: 99 } },
            { id: 'REDENEUTRO', cor: 'blue',   a: { top: 35, left: 44.5}, b: { top: 14, left: 99 } },
            { id: 'FASEINT',    cor: 'red',    a: { top: 19, left: 60 }, b: { top: 67, left: 58 } },
            { id: 'JUMP',       cor: 'red',    a: { top: 68, left: 56 }, b: { top: 72, left: 58 } },
            { id: 'RETORNO1',   cor: 'yellow', a: { top: 68, left: 64 }, b: { top: 55, left: 89.7 } },
            { id: 'RETORNO2',   cor: 'yellow', a: { top: 73, left: 64 }, b: { top: 55, left: 75 } },
            { id: 'NEUTROL1',   cor: 'blue',   a: { top: 15, left: 77.2 }, b: { top: 55, left: 75 } },
            { id: 'NEUTROL2',   cor: 'blue',   a: { top: 15, left: 93.2 }, b: { top: 56, left: 91.5 } }
        ];

        let passo = 0, pA_ok = false, dg = false, dr = false, t1 = false, t2 = false;
        const frames = { REDEFASE: 96, REDENEUTRO: 115, FASEINT: 43, JUMP: 10, RETORNO1: 54, RETORNO2: 45, NEUTROL1: 25, NEUTROL2: 25 };

        function iniciarLaboratorio() {
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('splash-screen').style.display = 'none'; document.getElementById('conteudo-lab').style.display = 'flex'; prox(); }, 500);
        }

        function reiniciarFluxo() { location.reload(); }

        function prox() {
            if (passo >= coordenadas.length) { document.getElementById('msg').innerHTML = "CONCLUÍDO! TESTE O CIRCUITO."; return; }
            const c = coordenadas[passo];
            document.getElementById('msg').innerText = `CONECTE: ${c.id}`;
            const pA = document.getElementById('ponto-A'), pB = document.getElementById('ponto-B');
            pA.style.top = c.a.top+"%"; pA.style.left = c.a.left+"%"; pA.style.backgroundColor = c.cor; pA.style.display = "block"; pA.className = "ponto-conexao";
            pB.style.top = c.b.top+"%"; pB.style.left = c.b.left+"%"; pB.style.backgroundColor = c.cor; pB.style.display = "none"; pB.className = "ponto-conexao";
            pA_ok = false;
        }

        function cliquePonto(t) {
            if (t === 'A') { pA_ok = true; document.getElementById('ponto-A').classList.add('ponto-verde'); document.getElementById('ponto-B').style.display = "block"; }
            else if (t === 'B' && pA_ok) { document.getElementById('ponto-B').classList.add('ponto-verde'); animar(); }
        }

        async function animar() {
            const id = coordenadas[passo].id;
            for (let i = 1; i <= frames[id]; i++) {
                document.getElementById(id).src = `${id}/quadro${String(i).padStart(3, '0')}.png`;
                await new Promise(r => setTimeout(r, 25));
            }
            passo++; prox();
        }

        function toggleDG() { dg = !dg; document.getElementById('al-dg').src = dg ? 'al_dg_on.png' : 'al_dg_off.png'; checar(); }
        function toggleDR() { dr = !dr; document.getElementById('al-dr').src = dr ? 'al_dr_on.png' : 'al_dr_off.png'; checar(); }
        function toggleTecla(n) { if(n===1) { t1=!t1; document.getElementById('tecla-l1').src=t1?'intum_on.png':'intum_off.png'; } else { t2=!t2; document.getElementById('tecla-l2').src=t2?'intdois_on.png':'intdois_off.png'; } checar(); }

        function checar() {
            const ok = passo >= coordenadas.length && dg && dr;
            document.getElementById('lamp1-on').style.display = (ok && t1) ? 'block' : 'none';
            document.getElementById('lamp2-on').style.display = (ok && t2) ? 'block' : 'none';
        }
    </script>
</body>
</html>
