<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SMT Pro - Interruptor Duplo</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Reset total para eliminar molduras brancas */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #060b13; 
            color: white; 
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        #painel-status {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
            text-align: center;
            color: #00f0ff;
            text-shadow: 0 0 10px #00f0ff;
            font-size: 1.2em;
            letter-spacing: 2px;
        }

        #container-simulador { 
            position: relative; 
            width: 1000px; /* Largura padrão dos seus ambientes */
            height: 600px; /* Altura padrão */
            background: url('ambiente.jpg') no-repeat center center;
            background-size: contain;
            line-height: 0;
        }

        /* Camadas de cabos - Absolutas e transparentes */
        .camada-cabo { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            z-index: 10;
        }

        /* Hotspots Invisíveis para as teclas */
        .tecla {
            position: absolute;
            z-index: 100;
            cursor: pointer;
            border: 1px dashed rgba(0, 240, 255, 0.1); /* Quase invisível */
        }
        .tecla:hover { border: 1px solid #00f0ff; background: rgba(0, 240, 255, 0.05); }

        .status-on { color: #00ff00; }
        .status-off { color: #ff0000; }
    </style>
</head>
<body>

    <div id="painel-status">SISTEMA SMT PRO: <span id="msg">INICIALIZANDO...</span></div>

    <div id="container-simulador">
        <img id="REDEFASE" class="camada-cabo">
        <img id="REDENEUTRO" class="camada-cabo">
        <img id="FASEINT" class="camada-cabo">
        <img id="JUMP" class="camada-cabo">
        <img id="RETORNO1" class="camada-cabo">
        <img id="RETORNO2" class="camada-cabo">
        <img id="NEUTROL1" class="camada-cabo">
        <img id="NEUTROL2" class="camada-cabo">

        <div class="tecla" style="top: 45%; left: 44%; width: 35px; height: 55px;" onclick="toggle(1)"></div>
        <div class="tecla" style="top: 45%; left: 49%; width: 35px; height: 55px;" onclick="toggle(2)"></div>
    </div>

    <script>
        const frames = {
            REDEFASE: 96, REDENEUTRO: 115, FASEINT: 43, JUMP: 10,
            RETORNO1: 54, RETORNO2: 45, NEUTROL1: 25, NEUTROL2: 20
        };

        let ligado1 = false;
        let ligado2 = false;

        async function animar(pasta) {
            const img = document.getElementById(pasta);
            const total = frames[pasta];
            for (let i = 1; i <= total; i++) {
                let f = String(i).padStart(3, '0');
                img.src = `${pasta}/quadro${f}.png`;
                await new Promise(r => setTimeout(r, 25));
            }
        }

        async function toggle(id) {
            const msg = document.getElementById('msg');
            if (id === 1) {
                ligado1 = !ligado1;
                if (ligado1) {
                    msg.innerHTML = "CIRC 1 <span class='status-on'>LIGADO</span>";
                    animar('NEUTROL1');
                    await animar('RETORNO1');
                } else {
                    msg.innerHTML = "CIRC 1 <span class='status-off'>OFF</span>";
                    document.getElementById('RETORNO1').src = "";
                    document.getElementById('NEUTROL1').src = "";
                }
            } else {
                ligado2 = !ligado2;
                if (ligado2) {
                    msg.innerHTML = "CIRC 2 <span class='status-on'>LIGADO</span>";
                    animar('NEUTROL2');
                    await animar('RETORNO2');
                } else {
                    msg.innerHTML = "CIRC 2 <span class='status-off'>OFF</span>";
                    document.getElementById('RETORNO2').src = "";
                    document.getElementById('NEUTROL2').src = "";
                }
            }
        }

        // Distribuição Inicial
        window.onload = async () => {
            await animar('REDEFASE');
            await animar('REDENEUTRO');
            await animar('FASEINT');
            await animar('JUMP');
            document.getElementById('msg').innerText = "SISTEMA PRONTO";
        };
    </script>
</body>
</html>
