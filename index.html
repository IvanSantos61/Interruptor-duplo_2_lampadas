<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SMT Pro - FioCerto</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 1. RESET RADICAL: Mata qualquer possibilidade de borda ou fundo branco */
        html, body { 
            margin: 0; padding: 0; background: #060b13; 
            width: 100%; height: 100vh; overflow: hidden; 
        }
        
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            outline: none !important; 
            border: none !important;
            background-color: transparent; /* Garante que nada tenha fundo branco por padrão */
        }

        body { color: white; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; }

        /* --- INTERFACE --- */
        #conteudo-lab { display: flex; flex-direction: column; align-items: center; width: 100%; padding-top: 30px; }
        
        .titulo-principal {
            color: #00f0ff; font-size: 38px; letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.8);
            margin-bottom: 30px; text-transform: uppercase;
        }

        /* 2. O PULO DO GATO: SANGRIA TÉCNICA 
           Criamos um "Corte de Segurança". Se a moldura estiver nas bordas da imagem ou do container, 
           o transform: scale(1.01) vai empurrar essa moldura 1% para fora e o overflow: hidden vai cortá-la.
        */
        #container-simulador { 
            position: relative; 
            width: 1000px; 
            height: 600px; 
            background: #060b13 url('ambiente.jpg') no-repeat center center; 
            background-size: 100% 100%; 
            overflow: hidden; /* Corta o que estiver fora do limite */
            transform: scale(1.01); /* Expande levemente para esconder as bordas */
        }

        /* 3. TRATAMENTO DAS IMAGENS DOS CABOS */
        .camada-cabo { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; 
            display: block; 
            /* Evita o retângulo branco de imagem sem SRC */
            content: ""; 
        }
        
        /* Só aplica o conteúdo quando o SRC existir via JS */
        img[src] { content: normal; }

        /* Estilos dos componentes técnicos */
        .alavanca, .tecla { position: absolute; z-index: 110; cursor: pointer; }
        .lampada-acesa { position: absolute; z-index: 105; pointer-events: none; display: none; }
    </style>
</head>
<body>

    <div id="conteudo-lab">
        <h1 class="titulo-principal">LABORATÓRIO SMT PRO</h1>

        <div id="container-simulador">
            <img id="REDEFASE" class="camada-cabo">
            <img id="REDENEUTRO" class="camada-cabo">
            <img id="FASEINT" class="camada-cabo">
            <img id="JUMP" class="camada-cabo">
            <img id="RETORNO1" class="camada-cabo">
            <img id="RETORNO2" class="camada-cabo">
            <img id="NEUTROL1" class="camada-cabo">
            <img id="NEUTROL2" class="camada-cabo">

            <img id="al-dg" src="al_dg_off.png" class="alavanca" style="top: 27.6%; left: 12%; width: 39.2px;" onclick="toggleDG()">
            <img id="tecla-l1" src="intum_off.png" class="tecla" style="top: 64.5%; left: 57.5%; width: 65px;" onclick="toggleTecla(1)">

            <img id="lamp1-on" src="lamp_on.png" class="lampada-acesa" style="top: 60.5%; left: 66.6%; width: 170px;">
        </div>
    </div>

    <script>
        // Sistema de animação simplificado para teste imediato
        async function processarCabo(id, frames) {
            const img = document.getElementById(id);
            for (let i = 1; i <= frames; i++) {
                img.src = `${id}/quadro${String(i).padStart(3, '0')}.png`;
                await new Promise(r => setTimeout(r, 20));
            }
        }
        
        let dgLigado = false;
        function toggleDG() { 
            dgLigado = !dgLigado; 
            document.getElementById('al-dg').src = dgLigado ? 'al_dg_on.png' : 'al_dg_off.png'; 
        }
    </script>
</body>
</html>
