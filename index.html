<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SMT Pro - Laboratório de Instalação</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html, body { margin: 0; padding: 0; background: #060b13; width: 100%; min-height: 100vh; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { color: white; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        #container-simulador { 
            position: relative; width: 1000px; height: 600px; 
            background: url('ambiente.jpg') no-repeat center center; 
            background-size: contain; border: 2px solid #1a2a44; 
        }
        
        .camada-cabo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: block; }
        
        .ponto-conexao { 
            position: absolute; width: 22px; height: 22px; border-radius: 50%; 
            border: 2px solid #fff; z-index: 150; cursor: pointer; 
            display: none; transform: translate(-50%, -50%); box-shadow: 0 0 12px #000; 
        }
        .ponto-verde { background: #00ff00 !important; box-shadow: 0 0 15px #00ff00 !important; }

        .alavanca, .tecla { position: absolute; z-index: 110; cursor: pointer; }
        
        .lampada-acesa { position: absolute; z-index: 105; pointer-events: none; display: none; }
        .conector { position: absolute; z-index: 115; display: none; pointer-events: none; }
        
        #painel-status { margin-bottom: 15px; color: #00f0ff; text-shadow: 0 0 5px #00f0ff; text-transform: uppercase; }

        /* CONFIGURAÇÃO DO TOOLTIP (BALÃO DE TEXTO) */
        #tooltip {
            position: fixed;
            background: rgba(0, 240, 255, 0.95);
            color: #060b13;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            pointer-events: none;
            display: none;
            z-index: 2000;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
            border: 1px solid #fff;
            text-transform: uppercase;
        }

        /* CONFIGURAÇÃO DAS ÁREAS SENSÍVEIS */
        .hotspot {
            position: absolute;
            cursor: help;
            z-index: 100;
            background: rgba(0, 255, 255, 0.1); /* Cor suave para você enxergar os hotspots no teste */
        }
    </style>
</head>
<body>

    <div id="tooltip"></div>

    <div id="painel-status">MODO DE INSTALAÇÃO: <span id="msg">INICIANDO...</span></div>

    <div id="container-simulador">
        
        <div class="hotspot" style="top: 12%; left: 6%; width: 35px; height: 200px;" onmouseover="showTip('BARRA DE ATERRAMENTO')" onmouseout="hideTip()"></div>
        <div class="hotspot" style="top: 15%; left: 12%; width: 45px; height: 150px;" onmouseover="showTip('DISJUNTOR GERAL')" onmouseout="hideTip()"></div>
        <div class="hotspot" style="top: 15%; left: 15.6%; width: 40px; height: 153px;" onmouseover="showTip('DPS (PROTETOR DE SURTO)')" onmouseout="hideTip()"></div>
        <div class="hotspot" style="top: 15%; left: 19.5%; width: 90px; height: 161px;" onmouseover="showTip('DISPOSITIVO DR')" onmouseout="hideTip()"></div>
        <div class="hotspot" style="top: 15%; left: 28.5%; width: 115px; height: 152px;" onmouseover="showTip('DISJUNTORES DOS CIRCUITOS')" onmouseout="hideTip()"></div>
        <div class="hotspot" style="top: 12%; left: 42.6%; width: 35px; height: 200px;" onmouseover="showTip('BARRA DE NEUTRO')" onmouseout="hideTip()"></div>
        <div class="hotspot" style="top: 55%; left: 6%; width: 45px; height: 130px;" onmouseover="showTip('REDE ELÉTRICA')" onmouseout="hideTip()"></div>

        <div class="hotspot" style="top: 58%; left: 27.5%; width: 130px; height: 180px;" onmouseover="showTip('CAIXA DE PASSAGEM 4x2')" onmouseout="hideTip()"></div>
        <div class="hotspot" style="top: 13%; left: 54.5%; width: 130px; height: 180px;" onmouseover="showTip('CAIXA DE PASSAGEM 4x2')" onmouseout="hideTip()"></div>
        <div class="hotspot" style="top: 13%; left: 70.5%; width: 130px; height: 180px;" onmouseover="showTip('CAIXA DE PASSAGEM 4x2')" onmouseout="hideTip()"></div>
        <div class="hotspot" style="top: 13%; left: 86.5%; width: 130px; height: 180px;" onmouseover="showTip('CAIXA DE PASSAGEM 4x2')" onmouseout="hideTip()"></div>

        <div class="hotspot" style="top: 56%; left: 57%; width: 70px; height: 160px;" onmouseover="showTip('INTERRUPTOR 2 SEÇÕES')" onmouseout="hideTip()"></div>

        <div class="hotspot" style="top: 60%; left: 73%; width: 40px; height: 48px;" onmouseover="showTip('BOCAL E27')" onmouseout="hideTip()"></div>
        <div class="hotspot" style="top: 67%; left: 71.7%; width: 66px; height: 85px;" onmouseover="showTip('LÂMPADA LED 127V')" onmouseout="hideTip()"></div>

        <div class="hotspot" style="top: 60%; left: 89.3%; width: 40px; height: 48px;" onmouseover="showTip('BOCAL E27')" onmouseout="hideTip()"></div>
        <div class="hotspot" style="top: 67%; left: 88.2%; width: 66px; height: 85px;" onmouseover="showTip('LÂMPADA LED 127V')" onmouseout="hideTip()"></div>

        <img id="REDEFASE" class="camada-cabo">
        <img id="REDENEUTRO" class="camada-cabo">
        <img id="FASEINT" class="camada-cabo">
        <img id="JUMP" class="camada-cabo">
        <img id="RETORNO1" class="camada-cabo">
        <img id="RETORNO2" class="camada-cabo">
        <img id="NEUTROL1" class="camada-cabo">
        <img id="NEUTROL2" class="camada-cabo">

        <img id="con-fase" src="con_derivacao.png" class="conector" style="top: 14%; left: 57%; width: 40px;">
        <img id="con-neutro1" src="con_derivacao.png" class="conector" style="top: 11.4%; left: 75.7%; width: 40px;">
        <img id="con-neutro2" src="con_derivacao.png" class="conector" style="top: 11.4%; left: 92%; width: 40px;">

        <img id="al-dg" src="al_dg_off.png" class="alavanca" style="top: 27.6%; left: 12%; width: 39.2px;" onclick="toggleDG()">
        <img id="al-dr" src="al_dr_off.png" class="alavanca" style="top: 30%; left: 23.5%; width: 55px;" onclick="toggleDR()">
        
        <img id="tecla-l1" src="intum_off.png" class="tecla" style="top: 64.5%; left: 57.5%; width: 65px;" onclick="toggleTecla(1)">
        <img id="tecla-l2" src="intdois_off.png" class="tecla" style="top: 68.9%; left: 57.5%; width: 65px;" onclick="toggleTecla(2)">

        <img id="lamp1-on" src="lamp_on.png" class="lampada-acesa" style="top: 60.5%; left: 66.6%; width: 170px;">
        <img id="lamp2-on" src="lamp_on.png" class="lampada-acesa" style="top: 60.5%; left: 82.9%; width: 170px;">

        <div id="ponto-A" class="ponto-conexao" onclick="cliquePonto('A')"></div>
        <div id="ponto-B" class="ponto-conexao" onclick="cliquePonto('B')"></div>
    </div>

    <script>
        const coordenadasInstalacao = [
            { id: 'REDEFASE',   cor: 'red',    a: { top: 38, left: 26 }, b: { top: 17, left: 99 } },
            { id: 'REDENEUTRO', cor: 'blue',   a: { top: 35, left: 44.5}, b: { top: 14, left: 99 } },
            { id: 'FASEINT',    cor: 'red',    a: { top: 19, left: 60 }, b: { top: 67, left: 58 } },
            { id: 'JUMP',       cor: 'red',    a: { top: 68, left: 56 }, b: { top: 72, left: 58 } },
            { id: 'RETORNO1',   cor: 'yellow', a: { top: 68, left: 64 }, b: { top: 55, left: 89.7 } },
            { id: 'RETORNO2',   cor: 'yellow', a: { top: 73, left: 64 }, b: { top: 55, left: 75 } },
            { id: 'NEUTROL1',   cor: 'blue',   a: { top: 15, left: 77.2 }, b: { top: 55, left: 75 } },
            { id: 'NEUTROL2',   cor: 'blue',   a: { top: 15, left: 93.2 }, b: { top: 56, left: 91.5 } }
        ];

        let passoAtivo = 0;
        let pA_ok = false;
        let dgLigado = false;
        let drLigado = false;
        let tecla1Ligada = false;
        let tecla2Ligada = false;

        const totalFrames = { REDEFASE: 96, REDENEUTRO: 115, FASEINT: 43, JUMP: 10, RETORNO1: 54, RETORNO2: 45, NEUTROL1: 25, NEUTROL2: 25 };

        function carregarPasso() {
            if (passoAtivo >= coordenadasInstalacao.length) {
                document.getElementById('msg').innerHTML = "MONTAGEM CONCLUÍDA! <span style='color:#fff'>TESTE O SISTEMA.</span>";
                document.getElementById('ponto-A').style.display = 'none';
                document.getElementById('ponto-B').style.display = 'none';
                verificarEnergia();
                return;
            }
            const item = coordenadasInstalacao[passoAtivo];
            if (item.id === 'FASEINT') document.getElementById('con-fase').style.display = 'block';
            else if (item.id === 'NEUTROL1') document.getElementById('con-neutro1').style.display = 'block';
            else if (item.id === 'NEUTROL2') document.getElementById('con-neutro2').style.display = 'block';

            document.getElementById('msg').innerText = "PASSO " + (passoAtivo + 1) + ": " + item.id;
            
            const pA = document.getElementById('ponto-A');
            pA.style.top = item.a.top + "%"; pA.style.left = item.a.left + "%";
            pA.classList.remove('ponto-verde');
            pA.style.backgroundColor = item.cor;
            pA.style.display = "block";
            
            const pB = document.getElementById('ponto-B');
            pB.style.top = item.b.top + "%"; pB.style.left = item.b.left + "%";
            pB.classList.remove('ponto-verde');
            pB.style.backgroundColor = item.cor;
            pB.style.display = "none";
            pA_ok = false;
        }

        function cliquePonto(tipo) {
            if (tipo === 'A') { pA_ok = true; document.getElementById('ponto-A').classList.add('ponto-verde'); document.getElementById('ponto-B').style.display = "block"; }
            else if (tipo === 'B' && pA_ok) { document.getElementById('ponto-B').classList.add('ponto-verde'); processarCabo(); }
        }

        async function processarCabo() {
            const id = coordenadasInstalacao[passoAtivo].id;
            const img = document.getElementById(id);
            for (let i = 1; i <= totalFrames[id]; i++) {
                img.src = `${id}/quadro${String(i).padStart(3, '0')}.png`;
                await new Promise(r => setTimeout(r, 20));
            }
            passoAtivo++;
            setTimeout(carregarPasso, 500);
        }

        function toggleDG() { dgLigado = !dgLigado; document.getElementById('al-dg').src = dgLigado ? 'al_dg_on.png' : 'al_dg_off.png'; verificarEnergia(); }
        function toggleDR() { drLigado = !drLigado; document.getElementById('al-dr').src = drLigado ? 'al_dr_on.png' : 'al_dr_off.png'; verificarEnergia(); }
        function toggleTecla(num) {
            if (num === 1) {
                tecla1Ligada = !tecla1Ligada;
                document.getElementById('tecla-l1').src = tecla1Ligada ? 'intum_on.png' : 'intum_off.png';
            } else {
                tecla2Ligada = !tecla2Ligada;
                document.getElementById('tecla-l2').src = tecla2Ligada ? 'intdois_on.png' : 'intdois_off.png';
            }
            verificarEnergia();
        }

        function verificarEnergia() {
            const painel = document.getElementById('msg');
            const l1 = document.getElementById('lamp1-on');
            const l2 = document.getElementById('lamp2-on');
            const fiacaoPronta = passoAtivo >= coordenadasInstalacao.length;
            const energiaDisponivel = dgLigado && drLigado;
            if (fiacaoPronta) {
                if (energiaDisponivel) {
                    painel.innerHTML = "<span style='color:#00ff00'>SISTEMA ENERGIZADO - OK</span>";
                    l1.style.display = tecla1Ligada ? 'block' : 'none';
                    l2.style.display = tecla2Ligada ? 'block' : 'none';
                } else {
                    painel.innerHTML = "<span style='color:#ff0000'> CIRCUITO SECCIONADO</span>";
                    l1.style.display = 'none'; l2.style.display = 'none';
                }
            }
        }

        // Lógica do Tooltip
        const tip = document.getElementById('tooltip');
        function showTip(texto) { tip.innerText = texto; tip.style.display = 'block'; }
        function hideTip() { tip.style.display = 'none'; }
        document.addEventListener('mousemove', function(e) {
            tip.style.left = (e.clientX + 15) + 'px';
            tip.style.top = (e.clientY - 15) + 'px';
        });

        window.onload = carregarPasso;
    </script>
</body>
</html>
