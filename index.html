<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Laboratório SMT Pro - Fiação Completa</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; background: #060b13; color: white; 
            display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px;
        }

        h1 { font-family: 'Orbitron'; color: #00f0ff; text-shadow: 0 0 15px #00f0ff; text-transform: uppercase; margin-bottom: 10px; }

        #painel-status {
            width: 90%; max-width: 1000px; background: rgba(0,0,0,0.6);
            border: 1px solid #1a2a44; padding: 15px; margin-bottom: 20px;
            font-family: 'Orbitron'; text-align: center; border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
        }

        #container-simulador { 
            position: relative; width: 1000px; height: 600px; /* Ajuste conforme seu ambiente.jpg */
            border: 2px solid #1a2a44; border-radius: 10px; overflow: hidden; 
            background: url('ambiente.jpg') no-repeat center; background-size: contain;
        }

        .camada-cabo { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10;
        }

        .tecla-hotspot {
            position: absolute; z-index: 100; cursor: pointer;
            border: 1px dashed rgba(0, 240, 255, 0.3); transition: 0.2s;
        }
        .tecla-hotspot:hover { background: rgba(0, 240, 255, 0.2); border-color: #00f0ff; }

        .status-on { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
        .status-off { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
    </style>
</head>
<body>

    <h1>LABORATÓRIO SMT PRO</h1>

    <div id="painel-status">
        <div id="status-mensagem">INICIALIZANDO SISTEMA...</div>
    </div>

    <div id="container-simulador">
        <img id="REDEFASE" class="camada-cabo">
        <img id="REDENEUTRO" class="camada-cabo">
        <img id="FASEINT" class="camada-cabo">
        <img id="JUMP" class="camada-cabo">
        
        <img id="RETORNO1" class="camada-cabo">
        <img id="RETORNO2" class="camada-cabo">
        <img id="NEUTROL1" class="camada-cabo">
        <img id="NEUTROL2" class="camada-cabo">

        <div class="tecla-hotspot" style="top: 45%; left: 42%; width: 40px; height: 60px;" onclick="operarCircuito(1)"></div>
        <div class="tecla-hotspot" style="top: 45%; left: 48%; width: 40px; height: 60px;" onclick="operarCircuito(2)"></div>
    </div>

    <script>
        // Dados das sequências conforme suas pastas no GitHub
        const fiação = {
            REDEFASE: 96, REDENEUTRO: 115, FASEINT: 43, JUMP: 10,
            RETORNO1: 54, RETORNO2: 45, NEUTROL1: 25, NEUTROL2: 20
        };

        let circuito1Ativo = false;
        let circuito2Ativo = false;

        // Função universal de animação
        async function animar(id) {
            const img = document.getElementById(id);
            const total = fiação[id];
            
            for (let i = 1; i <= total; i++) {
                let frame = String(i).padStart(3, '0');
                img.src = `${id}/quadro${frame}.png`;
                // Pequeno delay para percepção do movimento do cabo
                await new Promise(r => setTimeout(r, 20)); 
            }
        }

        async function operarCircuito(n) {
            const msg = document.getElementById('status-mensagem');
            
            if (n === 1) {
                circuito1Ativo = !circuito1Ativo;
                if (circuito1Ativo) {
                    msg.innerHTML = "LÂMPADA 1: <span class='status-on'>LIGADA</span>";
                    // Roda Neutro e Retorno simultaneamente
                    animar('NEUTROL1');
                    await animar('RETORNO1');
                } else {
                    msg.innerHTML = "LÂMPADA 1: <span class='status-off'>DESLIGADA</span>";
                    document.getElementById('RETORNO1').src = "";
                    document.getElementById('NEUTROL1').src = "";
                }
            } else {
                circuito2Ativo = !circuito2Ativo;
                if (circuito2Ativo) {
                    msg.innerHTML = "LÂMPADA 2: <span class='status-on'>LIGADA</span>";
                    animar('NEUTROL2');
                    await animar('RETORNO2');
                } else {
                    msg.innerHTML = "LÂMPADA 2: <span class='status-off'>DESLIGADA</span>";
                    document.getElementById('RETORNO2').src = "";
                    document.getElementById('NEUTROL2').src = "";
                }
            }
        }

        // Setup Inicial Automático
        window.onload = async () => {
            const msg = document.getElementById('status-mensagem');
            
            msg.innerText = "MONTANDO INFRAESTRUTURA DE REDE...";
            await animar('REDEFASE');
            await animar('REDENEUTRO');
            
            msg.innerText = "ALIMENTANDO INTERRUPTOR DUPLO...";
            await animar('FASEINT');
            await animar('JUMP');
            
            msg.innerText = "SISTEMA PRONTO: INTERAJA COM O INTERRUPTOR";
        };
    </script>
</body>
</html>
