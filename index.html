<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ajuste de Coordenadas - SMT Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* 1. Reset agressivo: adicione o seletor 'html' e garanta fundo escuro */
    html, body { 
        margin: 0; 
        padding: 0; 
        background: #060b13; /* Se o fundo do navegador for branco, qualquer brecha brilha */
        width: 100%;
        min-height: 100vh;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { 
        color: white; 
        font-family: 'Orbitron', sans-serif; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        padding: 20px; 
    }

    #container-simulador { 
        position: relative; 
        width: 1000px; 
        height: 600px; 
        background: url('ambiente.jpg') no-repeat center center; 
        background-size: contain;
        border: 2px solid #1a2a44;
        /* 2. Remova o espaço de linha que imagens geram */
        line-height: 0; 
        font-size: 0;
        /* 3. Garanta que nada saia das bordas */
        overflow: hidden;
    }

    /* Restante do seu código permanece igual */
    .camada-cabo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
    /* ... */
</style>
</head>
<body>

    <div id="painel-status">MODO DE AJUSTE: <span id="msg">CARREGANDO...</span></div>

    <div id="container-simulador">
        <img id="REDEFASE" class="camada-cabo">
        <img id="REDENEUTRO" class="camada-cabo">
        <img id="FASEINT" class="camada-cabo">
        <img id="JUMP" class="camada-cabo">
        <img id="RETORNO1" class="camada-cabo">
        <img id="RETORNO2" class="camada-cabo">
        <img id="NEUTROL1" class="camada-cabo">
        <img id="NEUTROL2" class="camada-cabo">

        <div id="ponto-A" class="ponto-conexao" onclick="cliquePonto('A')"></div>
        <div id="ponto-B" class="ponto-conexao" onclick="cliquePonto('B')"></div>
    </div>

    <script>
        const coordenadasInstalacao = [
            { id: 'REDEFASE',   cor: 'red',    a: { top: 38, left: 26  }, b: { top: 17, left: 99 } },
            { id: 'REDENEUTRO', cor: 'blue',   a: { top: 35, left: 44.5}, b: { top: 14, left: 99 } },
            { id: 'FASEINT',    cor: 'red',    a: { top: 19, left: 60 }, b: { top: 67, left: 58 } },
            { id: 'JUMP',       cor: 'red',    a: { top: 68, left: 56 }, b: { top: 72, left: 58 } },
            { id: 'RETORNO1',   cor: 'yellow', a: { top: 68.0, left: 64.0 }, b: { top: 55.0, left: 89.7 } },
            { id: 'RETORNO2',   cor: 'yellow', a: { top: 73, left: 64 }, b: { top: 55.0, left: 73.3 } },
            { id: 'NEUTROL1',   cor: 'blue',   a: { top: 20.0, left: 20.0 }, b: { top: 10.0, left: 70.0 } },
            { id: 'NEUTROL2',   cor: 'blue',   a: { top: 20.0, left: 22.0 }, b: { top: 10.0, left: 80.0 } }
        ];

        let passoAtivo = 0;
        let pA_ok = false;
        
        // Padronizado com 'L' para bater com as pastas de imagem
        const totalFrames = { 
            REDEFASE: 96, REDENEUTRO: 115, FASEINT: 43, JUMP: 10, 
            RETORNO1: 54, RETORNO2: 45, NEUTROL1: 25, NEUTROL2: 20 
        };

        function carregarPasso() {
            if (passoAtivo >= coordenadasInstalacao.length) {
                document.getElementById('msg').innerText = "INSTALAÇÃO COMPLETA!";
                return;
            }

            const item = coordenadasInstalacao[passoAtivo];
            document.getElementById('msg').innerText = "CONECTE: " + item.id;

            const pA = document.getElementById('ponto-A');
            pA.style.top = item.a.top + "%";
            pA.style.left = item.a.left + "%";
            pA.style.backgroundColor = item.cor;
            pA.style.display = "block";
            pA.classList.remove('ponto-verde');

            const pB = document.getElementById('ponto-B');
            pB.style.top = item.b.top + "%";
            pB.style.left = item.b.left + "%";
            pB.style.backgroundColor = item.cor;
            pB.style.display = "none";
            pB.classList.remove('ponto-verde');

            pA_ok = false;
        }

        function cliquePonto(tipo) {
            if (tipo === 'A') {
                pA_ok = true;
                document.getElementById('ponto-A').classList.add('ponto-verde');
                document.getElementById('ponto-B').style.display = "block";
            } else if (tipo === 'B' && pA_ok) {
                document.getElementById('ponto-B').classList.add('ponto-verde');
                processarCabo();
            }
        }

        async function processarCabo() {
            const id = coordenadasInstalacao[passoAtivo].id;
            const img = document.getElementById(id);
            const frames = totalFrames[id];
            
            if (!frames) {
                console.error("Erro: Frames não definidos para o ID " + id);
                return;
            }

            for (let i = 1; i <= frames; i++) {
                img.src = `${id}/quadro${String(i).padStart(3, '0')}.png`;
                await new Promise(r => setTimeout(r, 20));
            }

            passoAtivo++;
            setTimeout(carregarPasso, 600);
        }

        window.onload = carregarPasso;
    </script>
</body>
</html>
