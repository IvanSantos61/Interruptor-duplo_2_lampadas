<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro - FioCerto</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background-color: #060b13; color: #ffd700; font-family: 'Segoe UI', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; width: 100vw; height: 100vh; overflow: hidden; }

        /* --- TELA DE ENTRADA (SPLASH) --- */
        #tela-entrada { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #060b13; z-index: 2000; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s ease, visibility 0.5s; }
        .moldura-entrada { width: 80%; max-width: 900px; height: 70%; max-height: 450px; border: 3px solid #00f0ff; border-radius: 25px; box-shadow: 0 0 50px rgba(0, 240, 255, 0.4), inset 0 0 20px rgba(0, 240, 255, 0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .intro-entrada { color: #008b8b; font-size: 55px; font-weight: 400; text-transform: uppercase; margin-bottom: 10px; }
        .titulo-entrada { color: #00f0ff; font-size: 38px; text-transform: uppercase; text-shadow: 0 0 25px rgba(0, 240, 255, 0.6); margin-bottom: 25px; }
        .subtitulo-entrada { color: #00f0ff; font-size: 24px; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 40px; }
        .btn-iniciar-lab { background: transparent; border: 2px solid #00f0ff; border-radius: 50px; color: #00f0ff; font-size: 16px; font-weight: bold; text-transform: uppercase; padding: 12px 35px; cursor: pointer; animation: pulsarBotao 1.5s infinite; }
        @keyframes pulsarBotao { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; box-shadow: 0 0 25px rgba(0,240,255,0.6); } }

        /* --- INTERFACE PRINCIPAL --- */
        #titulo-sistema { color: #00f0ff; font-size: 40px; margin-top: 2.5vh; text-transform: uppercase; text-shadow: 0 0 15px rgba(0, 240, 255, 0.6); }
        #painel-status { width: 100%; max-width: 1200px; margin: 1vh auto; padding: 20px; background: rgba(4, 10, 20, 0.9); border: 1px solid #16222f; border-radius: 12px; display: flex; align-items: center; justify-content: center; min-height: 80px; }
        #instrucao { color: #ffd700; font-size: 20px; font-weight: bold; text-transform: uppercase; }
        .tag-circuito { color: #ff3333; font-weight: 900; }
        .tag-rede { color: #00ff00; font-weight: 900; }

        /* --- CONTAINER DO PROJETO --- */
        #projeto-container { position: relative; width: 100%; max-width: 1000px; border: 2px solid #1f2937; box-shadow: 0 0 40px #000; }
        .imagem-base { width: 100%; display: block; border-radius: 8px; }

        /* BALÕES */
        .balao-informativo { position: absolute; background: rgba(4, 10, 20, 0.95); border-radius: 12px; padding: 15px; color: #fff; font-size: 14px; text-align: center; z-index: 130; opacity: 0; display: none; transition: opacity 0.4s ease; }
        .txt-norma-vermelho { color: #ff3333; font-weight: bold; display: block; margin-top: 10px; font-size: 12px; }

        /* COORDENADAS DOS BALÕES (ORIGINAIS) */
        #balao-secao { width: 230px; top: 42%; left: 2.5%; border: 2px solid #ffd700; }
        #balao-neutro-norma { width: 260px; top: 34%; left: 21%; border: 2px solid #0096ff; }
        /* ... outros balões seguem a mesma lógica ... */

        /* COMPONENTES */
        .tecla-movel, .carga-movel, .acessorio-movel { position: absolute; z-index: 120; cursor: pointer; }
        #tecla-dg { top: 25.5%; left: 11.8%; width: 6%; }
        #tecla-dr { top: 27.7%; left: 23.2%; width: 7.5%; }
        #tecla-int { top: 53.7%; left: 75.6%; width: 7.7%; }
        #conector-neutro { top: 75.2%; left: 39.5%; width: 9%; display: none; }
        #conector-neutro-3vias { top: 20%; left: 51.4%; width: 9%; display: none; transform: rotate(90deg); }
        #lampada1 { top: 4.5%; left: 68.8%; width: 49.5%; display: none; filter: drop-shadow(0 0 20px #fff700); }
        #lampada2 { top: 43.8%; left: 68.8%; width: 49.5%; display: none; filter: drop-shadow(0 0 20px #fff700); }

        /* HOTSPOTS */
        .hotspot { position: absolute; background: transparent; border: 1px dashed rgba(0,240,255,0.2); z-index: 90; cursor: help; }
        .hotspot:hover { border-color: #00f0ff; background: rgba(0,240,255,0.08); }
        .hotspot::before { content: attr(data-name); position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); background: #000; color: #ffd700; padding: 5px; border-radius: 4px; font-size: 11px; opacity: 0; pointer-events: none; }
        .hotspot:hover::before { opacity: 1; }

        .ponto-clique { position: absolute; width: 1.8%; aspect-ratio: 1/1; border: 0.2vw solid #fff; border-radius: 50%; z-index: 130; transform: translate(-50%, -50%); display: none; cursor: pointer; }
        .ponto-fase { background: rgba(255, 0, 0, 0.7); }
        .ponto-neutro { background: rgba(0, 150, 255, 0.7); }
        .ponto-retorno { background: rgba(255, 165, 0, 0.7); }
        .verde { background: #00ff00 !important; }
    </style>
</head>
<body>

    <div id="tela-entrada">
        <div class="moldura-entrada">
            <div class="intro-entrada">Laboratório SMT Pro</div>
            <h1 class="titulo-entrada">INTERRUPTOR SIMPLES PARA 2 LÂMPADAS</h1>
            <h2 class="subtitulo-entrada">CIRCUITO MONOFÁSICO - 127V</h2>
            <div style="color: #445566; margin-bottom: 30px;">© Ivan Santos - ConectaeadPLUS - 2026</div>
            <button class="btn-iniciar-lab" onclick="iniciarLaboratorio()">Clique para iniciar o Laboratório</button>
        </div>
    </div>

    <div id="titulo-sistema">Laboratório SMT Pro</div>
    <div id="painel-status"><span id="instrucao">CARREGANDO...</span></div>

    <div id="projeto-container">
        <img src="ambiente.jpg" class="imagem-base">

        <div class="hotspot" style="top:13%; left:11.5%; width:40px; height:150px;" data-name="DISJUNTOR GERAL"></div>
        <div class="hotspot" style="top:12.5%; left:19.5%; width:88px; height:160px;" data-name="DISPOSITIVO DR"></div>
        <div class="hotspot" style="top:9%; left:43.2%; width:22px; height:200px;" data-name="BARRA DE NEUTRO"></div>
        <div class="hotspot" style="top:50%; left:5%; width:40px; height:180px;" data-name="REDE ELÉTRICA"></div>
        <div class="hotspot" style="top:5.6%; left:52.3%; width:120px; height:200px;" data-name='CAIXA DE PASSAGEM 4x2"'></div>
        <div class="hotspot" style="top:61%; left:39%; width:120px; height:200px;" data-name='CAIXA DE PASSAGEM 4x2"'></div>
        <div class="hotspot" style="top:42%; left:71.6%; width:100px; height:210px;" data-name='INTERRUPTOR SIMPLES'></div>
        <div class="hotspot" style="top:38.8%; left:86.5%; width:110px; height:110px;" data-name='LÂMPADA LED'></div>
        <div class="hotspot" style="top:78.6%; left:86.5%; width:110px; height:110px;" data-name='LÂMPADA LED'></div>
        <div class="hotspot" style="top:29%; left:88%; width:70px; height:70px;" data-name='BOCAL E-27'></div>
        <div class="hotspot" style="top:68%; left:88%; width:70px; height:70px;" data-name='BOCAL E-27'></div>

        <div id="camadas-fios"></div>

        <div id="balao-secao" class="balao-informativo">A seção mínima dos fios de iluminação é 1,5mm²<span class="txt-norma-vermelho">(Item 6.2.6.1.1 da NBR-5410)</span></div>
        <div id="balao-neutro-norma" class="balao-informativo">O neutro deve ser de cor Azul Claro<span class="txt-norma-vermelho">(Item 6.1.5.3.1 da NBR-5410)</span></div>
        <img src="conector2vias.png" id="conector-neutro" class="acessorio-movel">
        <img src="conector3vias.png" id="conector-neutro-3vias" class="acessorio-movel">
        <img src="al_dg_off.png" id="tecla-dg" class="tecla-movel" data-status="off">
        <img src="al_dr_off.png" id="tecla-dr" class="tecla-movel" data-status="off">
        <img src="tec_int_off.png" id="tecla-int" class="tecla-movel" data-status="off">
        <img src="lamp_on.png" id="lampada1" class="carga-movel">
        <img src="lamp_on.png" id="lampada2" class="carga-movel">

        <div id="ponto-A" class="ponto-clique"></div>
        <div id="ponto-B" class="ponto-clique"></div>
    </div>

    <script>
        // LÓGICA DE ÁUDIO E ETAPAS (SUA LÓGICA ORIGINAL)
        const etapas = [
            { nome: "FASE 1", pasta: "FASE1", max: 24, cor: "ponto-fase", posA: { top: "38%", left: "27%" }, posB: { top: "79.3%", left: "40.5%" }, msgA: "REDE: CLIQUE NA REFERENCIA INDICADA NO DR...", msgB: "REDE: CLIQUE NO PONTO INDICADO NA CAIXA..." },
            // ... (todas as 10 etapas do seu código original aqui)
        ];

        let etapaAtual = 0;
        const txtInstrucao = document.getElementById('instrucao');

        function iniciarLaboratorio() {
            document.getElementById('tela-entrada').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('tela-entrada').style.visibility = "hidden";
                iniciarEtapa();
            }, 500);
        }

        function formatarTextoInstrucao(texto) {
            return texto.replace(/CIRCUITO:/g, '<span class="tag-circuito">CIRCUITO:</span>')
                        .replace(/REDE:/g, '<span class="tag-rede">REDE:</span>');
        }

        function iniciarEtapa() {
            if (etapaAtual >= etapas.length) return;
            const etapa = etapas[etapaAtual];
            txtInstrucao.innerHTML = formatarTextoInstrucao(etapa.msgA);
            // Mostrar ponto A, configurar clique, etc...
        }

        // Seus controles de DG, DR e Tecla permanecem os mesmos aqui.
    </script>
</body>
</html>
