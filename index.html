<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SMT Pro - Fiação Completa no Fundo</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Limpa qualquer margem ou moldura branca indesejada */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #060b13; 
            color: white; 
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        #painel-status {
            width: 100%;
            max-width: 1000px;
            padding: 15px;
            text-align: center;
            color: #00f0ff;
            text-shadow: 0 0 10px #00f0ff;
            font-size: 1.2em;
            letter-spacing: 2px;
        }

        #container-simulador { 
            position: relative; 
            width: 1000px; /* Ajuste para o tamanho do seu ambiente.jpg se necessário */
            height: 600px; 
            background: url('ambiente.jpg') no-repeat center center;
            background-size: contain;
        }

        /* Camadas transparentes de cabos empilhadas sobre o fundo */
        .camada-cabo { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            z-index: 10;
        }

        /* Hotspots das Teclas S1 e S2 */
        .tecla {
            position: absolute;
            z-index: 100;
            cursor: pointer;
            border: 1px dashed rgba(0, 240, 255, 0.2);
        }
        .tecla:hover { border: 1px solid #00f0ff; background: rgba(0, 240, 255, 0.05); }

        .status-ligado { color: #00ff00; text-shadow: 0 0 8px #00ff00; }
        .status-desligado { color: #ff0000; text-shadow: 0 0 8px #ff0000; }
    </style>
</head>
<body>

    <div id="painel-status">MONITORAMENTO SMT: <span id="msg">INICIANDO MONTAGEM...</span></div>

    <div id="container-simulador">
        <!-- Todas as camadas que você listou prontas para receber os quadros -->
        <img id="REDEFASE" class="camada-cabo">
        <img id="REDENEUTRO" class="camada-cabo">
        <img id="FASEINT" class="camada-cabo">
        <img id="JUMP" class="camada-cabo">
        <img id="RETORNO1" class="camada-cabo">
        <img id="RETORNO2" class="camada-cabo">
        <img id="NEUTROL1" class="camada-cabo">
        <img id="NEUTROL2" class="camada-cabo">

        <!-- Áreas de clique do interruptor duplo -->
        <div class="tecla" style="top: 45%; left: 44%; width: 35px; height: 55px;" onclick="testarInterruptor(1)"></div>
        <div class="tecla" style="top: 45%; left: 49%; width: 35px; height: 55px;" onclick="testarInterruptor(2)"></div>
    </div>

    <script>
        // Mapeamento exato das suas pastas e quantidade de quadros do GitHub
        const sequencias = {
            REDEFASE: 96,
            REDENEUTRO: 115,
            FASEINT: 43,
            JUMP: 10,
            RETORNO1: 54,
            RETORNO2: 45,
            NEUTROL1: 25,
            NEUTROL2: 20
        };

        // Função que renderiza os cabos na tela quadro a quadro
        async function desenharCabo(idPasta) {
            const imgElemento = document.getElementById(idPasta);
            const totalQuadros = sequencias[idPasta];
            
            for (let i = 1; i <= totalQuadros; i++) {
                let frame = String(i).padStart(3, '0');
                imgElemento.src = `${idPasta}/quadro${frame}.png`;
                await new Promise(resolve => setTimeout(resolve, 20)); // Velocidade da animação
            }
        }

        // FUNÇÃO PRINCIPAL: Carrega TODOS os cabos automaticamente na tela
        async function montarInfraestruturaCompleta() {
            const statusMsg = document.getElementById('msg');

            statusMsg.innerText = "ALIMENTANDO REDE PRINCIPAL...";
            await desenharCabo('REDEFASE');
            await desenharCabo('REDENEUTRO');

            statusMsg.innerText = "CONECTANDO CIRCUITO DO INTERRUPTOR...";
            await desenharCabo('FASEINT');
            await desenharCabo('JUMP');

            statusMsg.innerText = "PASSANDO RETORNOS E NEUTROS DAS LÂMPADAS...";
            await desenharCabo('RETORNO1');
            await desenharCabo('RETORNO2');
            await desenharCabo('NEUTROL1');
            await desenharCabo('NEUTROL2');

            statusMsg.innerText = "SISTEMA COMPLETAMENTE INSTALADO E ENERGIZADO!";
        }

        // Lógica de teste para o clique nos interruptores
        let s1 = false;
        let s2 = false;

        function testarInterruptor(id) {
            const statusMsg = document.getElementById('msg');
            if (id === 1) {
                s1 = !s1;
                statusMsg.innerHTML = s1 ? "INTERRUPTOR 1: <span class='status-ligado'>LIGADO (LÂMPADA 1 ACESA)</span>" : "INTERRUPTOR 1: <span class='status-desligado'>DESLIGADO</span>";
            } else {
                s2 = !s2;
                statusMsg.innerHTML = s2 ? "INTERRUPTOR 2: <span class='status-ligado'>LIGADO (LÂMPADA 2 ACESA)</span>" : "INTERRUPTOR 2: <span class='status-desligado'>DESLIGADO</span>";
            }
        }

        // Executa a montagem total assim que a página carrega
        window.onload = montarInfraestruturaCompleta;
    </script>
</body>
</html>
