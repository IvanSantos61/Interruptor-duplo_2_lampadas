<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SMT Pro - Simulador de Fiação</title>
    <style>
        /* Estilo do container principal */
        #cenario-smt {
            position: relative;
            width: 1280px; /* Ajuste para a largura da sua imagem ambiente.jpg */
            height: 720px; /* Ajuste para a altura da sua imagem ambiente.jpg */
            background-image: url('ambiente.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            margin: 0 auto;
            border: 3px solid #FFD700; /* Borda Yellow Gold */
            overflow: hidden;
            background-color: #000;
        }

        /* Todas as camadas de cabos ficam uma sobre a outra */
        .cabo-camada {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Garante que você clique no fundo, não na imagem */
        }

        .controles {
            text-align: center;
            padding: 20px;
            background: #121212;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background: #222;
            color: #00ffff;
            border: 2px solid #00ffff;
            font-weight: bold;
        }

        button:hover {
            background: #00ffff;
            color: #000;
        }
    </style>
</head>
<body style="background-color: #121212; color: white;">

    <div class="controles">
        <h2 style="color: #FFD700;">FioCerto - Visualizador de Infraestrutura</h2>
        <button onclick="animar('REDEFASE', 96)">Ligar Rede Fase</button>
        <button onclick="animar('REDENEUTRO', 115)">Ligar Rede Neutro</button>
        <button onclick="animar('RETORNO1', 54)">Retorno 1</button>
        <button onclick="animar('RETORNO2', 45)">Retorno 2</button>
    </div>

    <div id="cenario-smt">
        <img id="REDEFASE" class="cabo-camada">
        <img id="REDENEUTRO" class="cabo-camada">
        <img id="FASEINT" class="cabo-camada">
        <img id="JUMP" class="cabo-camada">
        <img id="NEUTROL1" class="cabo-camada">
        <img id="NEUTROL2" class="cabo-camada">
        <img id="RETORNO1" class="cabo-camada">
        <img id="RETORNO2" class="cabo-camada">
    </div>

    <script>
        // Função simples para rodar a sequência de quadros
        async function animar(idElemento, totalQuadros) {
            const imgElemento = document.getElementById(idElemento);
            
            for (let i = 1; i <= totalQuadros; i++) {
                // Monta o nome do arquivo exatamente como está nas suas pastas
                let frame = String(i).padStart(3, '0');
                imgElemento.src = `${idElemento}/quadro${frame}.png`;
                
                // Velocidade da distribuição (30ms por quadro)
                await new Promise(resolve => setTimeout(resolve, 30));
            }
        }

        // Inicia automaticamente as fiações principais ao carregar
        window.onload = () => {
            animar('REDEFASE', 96);
            setTimeout(() => animar('REDENEUTRO', 115), 500);
            setTimeout(() => animar('FASEINT', 43), 1000);
            setTimeout(() => animar('JUMP', 10), 1500);
        };
    </script>
</body>
</html>
