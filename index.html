<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SMT Pro - FioCerto</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html, body { margin: 0; padding: 0; background: #060b13; width: 100%; height: 100vh; overflow: hidden; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { color: white; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; }

        /* --- TELA DE SPLASH --- */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #060b13; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .moldura-splash { width: 900px; height: 500px; border: 2px solid #00f0ff; border-radius: 30px; box-shadow: 0 0 40px rgba(0, 240, 255, 0.4); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .splash-h1 { color: #00f0ff; font-size: 45px; letter-spacing: 5px; margin-bottom: 10px; text-shadow: 0 0 20px rgba(0, 240, 255, 0.6); }
        .splash-h2 { color: #00f0ff; font-size: 24px; letter-spacing: 2px; margin-bottom: 15px; }
        .splash-footer { color: #334455; font-size: 11px; margin-bottom: 40px; font-family: sans-serif; }
        .btn-iniciar { background: transparent; border: 2px solid #00f0ff; border-radius: 50px; color: #00f0ff; font-size: 15px; padding: 14px 45px; cursor: pointer; font-family: 'Orbitron'; animation: piscar 1.8s infinite; }
        @keyframes piscar { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* --- INTERFACE --- */
        #conteudo-lab { display: none; flex-direction: column; align-items: center; width: 100%; padding-top: 30px; }
        .titulo-principal { color: #00f0ff; font-size: 38px; letter-spacing: 4px; margin-bottom: 30px; text-transform: uppercase; }
        #painel-status { width: 850px; height: 100px; background: #060b13; border: 1px solid #1a2a44; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; }
        #msg { color: #ff8c00; font-size: 16px; font-weight: bold; text-align: center; }
        #container-simulador { position: relative; width: 1000px; height: 600px; background: url('ambiente.jpg') no-repeat center center; background-size: contain; border: 1px solid #1a2a44; }

        /* --- QUADRO DE STATUS (LÓGICA DE ESTADO PURO) --- */
        #quadro-status-dispositivos {
            position: absolute; top: 260px; left: 620px; width: 230px;
            background: rgba(6, 11, 19, 0.95); border: 2px solid #00f0ff; border-radius: 8px;
            padding: 10px; display: none; flex-direction: column; gap: 8px; z-index: 300;
        }
        .header-status { background: #00f0ff; color: #060b13; font-size: 11px; font-weight: bold; text-align: center; padding: 4px; border-radius: 4px; }
        .linha-status { display: flex; justify-content: space-between; padding: 5px 12px; border: 1px solid #1a2a44; border-radius: 4px; font-size: 12px; }
        .ind-off { color: #ff0000; font-weight: bold; }
        .ind-on { color: #00ff00; font-weight: bold; text-shadow: 0 0 10px #00ff00; }

        /* --- ELEMENTOS DO SIMULADOR --- */
        .ponto-conexao { position: absolute; width: 24px; height: 24px; border-radius: 50%; border: 2px solid #fff; z-index: 150; cursor: pointer; display: none; transform: translate(-50%, -50%); }
        .ponto-selecionado { border: 3px solid #00ff00 !important; box-shadow: 0 0 20px #00ff00, inset 0 0 10px #00ff00 !important; }
        .camada-cabo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .alavanca, .tecla { position: absolute; z-index: 110; cursor: pointer; }
        .lampada-acesa { position: absolute; z-index: 105; pointer-events: none; display: none; }
        .conector { position: absolute; z-index: 115; display: none; }
        .hotspot { position: absolute; cursor: help; z-index: 100; }
        #tooltip { position: fixed; background: rgba(255, 255, 0, 0.95); color: #000; padding: 6px 12px; border-radius: 4px; font-size: 13px; font-weight: bold; display: none; z-index: 2000; }
        .btn-acao { position: absolute; width: 140px; padding: 10px; border-radius: 20px; border: none; font-family: 'Orbitron'; cursor: pointer; color: white; z-index: 200; }
        .btn-ajuda { top: 485px; left: 120px; background: #1a2a44; border: 1px solid #00f0ff; }
        .btn-reiniciar { top: 535px; left: 120px; background: #cc0000; }
    </style>
</head>
<body>

    <div id="tooltip"></div>

    <div id="splash-screen">
        <div class="moldura-splash">
            <h1 class="splash-h1">LABORATÓRIO SMT PRO</h1>
            <h2 class="splash-h2">INTERRUPTOR SIMPLES PARA 2 LÂMPADAS</h2>
            <p class="splash-footer">© Desenvolvido por Ivan Santos - ConectaeadPLUS - 2026</p>
            <button class="btn-iniciar" onclick="iniciarLaboratorio()">Clique para iniciar o laboratório</button>
        </div>
    </div>

    <div id="conteudo-lab">
        <h1 class="titulo-principal">LABORATÓRIO SMT PRO</h1>
        <div id="painel-status"><div id="msg">AGUARDANDO...</div></div>

        <div id="container-simulador">
            <div id="quadro-status-dispositivos">
                <div class="header-status">ESTADO DOS COMPONENTES</div>
                <div class="linha-status"><span>GERAL (DG)</span><span id="st-dg" class="ind-off">X</span></div>
                <div class="linha-status"><span>DIF. (DR)</span><span id="st-dr" class="ind-off">X</span></div>
                <div class="linha-status"><span>SEÇÃO 1</span><span id="st-l1" class="ind-off">X</span></div>
                <div class="linha-status"><span>SEÇÃO 2</span><span id="st-l2" class="ind-off">X</span></div>
            </div>

            <button class="btn-acao btn-ajuda">AJUDA</button>
            <button class="btn-acao btn-reiniciar" onclick="location.reload()">REINICIAR</button>

            <img id="REDEFASE" class="camada-cabo"><img id="REDENEUTRO" class="camada-cabo">
            <img id="FASEINT" class="camada-cabo"><img id="JUMP" class="camada-cabo">
            <img id="RETORNO1" class="camada-cabo"><img id="RETORNO2" class="camada-cabo">
            <img id="NEUTROL1" class="camada-cabo"><img id="NEUTROL2" class="camada-cabo">

            <img id="con-fase" src="con_derivacao.png" class="conector" style="top:14%; left:57%; width:40px;">
            <img id="con-neutro1" src="con_derivacao.png" class="conector" style="top:11.4%; left:75.7%; width:40px;">
            <img id="con-neutro2" src="con_derivacao.png" class="conector" style="top:11.4%; left:92%; width:40px;">

            <img id="al-dg" src="al_dg_off.png" class="alavanca" style="top:27.6%; left:12%; width:39.2px;" onclick="toggleDG()">
            <img id="al-dr" src="al_dr_off.png" class="alavanca" style="top:30%; left:23.5%; width:55px;" onclick="toggleDR()">
            <img id="tecla-l1" src="intum_off.png" class="tecla" style="top:64.5%; left:57.5%; width:65px;" onclick="toggleTecla(1)">
            <img id="tecla-l2" src="intdois_off.png" class="tecla" style="top:68.9%; left:57.5%; width:65px;" onclick="toggleTecla(2)">
            
            <img id="lamp1-on" src="lamp_on.png" class="lampada-acesa" style="top:60.5%; left:66.6%; width:170px;">
            <img id="lamp2-on" src="lamp_on.png" class="lampada-acesa" style="top:60.5%; left:82.9%; width:170px;">

            <div id="ponto-A" class="ponto-conexao" onclick="cliquePonto('A')"></div>
            <div id="ponto-B" class="ponto-conexao" onclick="cliquePonto('B')"></div>
        </div>
    </div>

    <script>
        let passoAtivo = 0, pA_ok = false, dgLigado = false, drLigado = false, tecla1Ligada = false, tecla2Ligada = false;

        const coordenadasInstalacao = [
            { id: 'REDEFASE',   cor: '#ff0000', a: { top: 38, left: 26 }, b: { top: 17, left: 99 } },
            { id: 'REDENEUTRO', cor: '#0066ff', a: { top: 35, left: 44.5}, b: { top: 14, left: 99 } },
            { id: 'FASEINT',    cor: '#ff0000', a: { top: 19, left: 60 }, b: { top: 67, left: 58 } },
            { id: 'JUMP',       cor: '#ff0000', a: { top: 68, left: 56 }, b: { top: 72, left: 58 } },
            { id: 'RETORNO1',   cor: '#ffff00', a: { top: 68, left: 64 }, b: { top: 55, left: 89.7 } },
            { id: 'RETORNO2',   cor: '#ffff00', a: { top: 73, left: 64 }, b: { top: 55, left: 75 } },
            { id: 'NEUTROL1',   cor: '#0066ff', a: { top: 15, left: 77.2 }, b: { top: 55, left: 75 } },
            { id: 'NEUTROL2',   cor: '#0066ff', a: { top: 15, left: 93.2 }, b: { top: 56, left: 91.5 } }
        ];

        const totalFrames = { REDEFASE: 96, REDENEUTRO: 115, FASEINT: 43, JUMP: 10, RETORNO1: 54, RETORNO2: 45, NEUTROL1: 25, NEUTROL2: 25 };

        function iniciarLaboratorio() {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('conteudo-lab').style.display = 'flex';
            carregarPasso();
        }

        function carregarPasso() {
            if (passoAtivo >= coordenadasInstalacao.length) {
                document.getElementById('msg').innerHTML = "FIAÇÃO PRONTA! OPERE OS DISPOSITIVOS.";
                document.getElementById('ponto-A').style.display = 'none';
                document.getElementById('ponto-B').style.display = 'none';
                document.getElementById('quadro-status-dispositivos').style.display = 'flex';
                verificarEnergia();
                return;
            }
            const item = coordenadasInstalacao[passoAtivo];
            if (item.id === 'FASEINT') document.getElementById('con-fase').style.display = 'block';
            if (item.id === 'NEUTROL1') document.getElementById('con-neutro1').style.display = 'block';
            if (item.id === 'NEUTROL2') document.getElementById('con-neutro2').style.display = 'block';

            document.getElementById('msg').innerHTML = `CONECTAR ${item.id}`;
            const pA = document.getElementById('ponto-A');
            pA.style.top = item.a.top + "%"; pA.style.left = item.a.left + "%";
            pA.style.backgroundColor = item.cor;
            pA.classList.remove('ponto-selecionado');
            pA.style.display = "block";
            document.getElementById('ponto-B').style.display = "none";
            pA_ok = false;
        }

        function cliquePonto(tipo) {
            const item = coordenadasInstalacao[passoAtivo];
            if (tipo === 'A') { 
                pA_ok = true; document.getElementById('ponto-A').classList.add('ponto-selecionado'); 
                const pB = document.getElementById('ponto-B');
                pB.style.top = item.b.top + "%"; pB.style.left = item.b.left + "%";
                pB.style.backgroundColor = item.cor;
                pB.style.display = "block"; 
            }
            else if (tipo === 'B' && pA_ok) { 
                document.getElementById('ponto-B').classList.add('ponto-selecionado');
                processarCabo(); 
            }
        }

        async function processarCabo() {
            const id = coordenadasInstalacao[passoAtivo].id;
            const img = document.getElementById(id);
            const delay = totalFrames[id] < 20 ? 50 : 25; 
            for (let i = 1; i <= totalFrames[id]; i++) {
                img.src = `${id}/quadro${String(i).padStart(3, '0')}.png`;
                await new Promise(r => setTimeout(r, delay));
            }
            passoAtivo++; carregarPasso();
        }

        function toggleDG() { dgLigado = !dgLigado; document.getElementById('al-dg').src = dgLigado ? 'al_dg_on.png' : 'al_dg_off.png'; verificarEnergia(); }
        function toggleDR() { drLigado = !drLigado; document.getElementById('al-dr').src = drLigado ? 'al_dr_on.png' : 'al_dr_off.png'; verificarEnergia(); }
        function toggleTecla(num) {
            if (num === 1) { tecla1Ligada = !tecla1Ligada; document.getElementById('tecla-l1').src = tecla1Ligada ? 'intum_on.png' : 'intum_off.png'; }
            else { tecla2Ligada = !tecla2Ligada; document.getElementById('tecla-l2').src = tecla2Ligada ? 'intdois_on.png' : 'intdois_off.png'; }
            verificarEnergia();
        }

        // LÓGICA DE ESTADO: Mostra se está ligado mecanicamente, ignorando se há energia no barramento.
        function verificarEnergia() {
            // As lâmpadas ainda dependem da lógica completa para acender visualmente (opcional)
            const fiaçãoOk = passoAtivo >= coordenadasInstalacao.length;
            const energiaPresente = dgLigado && drLigado && fiaçãoOk;

            document.getElementById('lamp1-on').style.display = (energiaPresente && tecla1Ligada) ? 'block' : 'none';
            document.getElementById('lamp2-on').style.display = (energiaPresente && tecla2Ligada) ? 'block' : 'none';
            
            // O Quadro de Status agora é Independente
            atualizarIcone('st-dg', dgLigado);
            atualizarIcone('st-dr', drLigado);
            atualizarIcone('st-l1', tecla1Ligada);
            atualizarIcone('st-l2', tecla2Ligada);
        }

        function atualizarIcone(id, ligado) {
            const el = document.getElementById(id);
            if (el) { el.innerText = ligado ? "OK" : "X"; el.className = ligado ? "ind-on" : "ind-off"; }
        }

        const tip = document.getElementById('tooltip');
        function showTip(t) { tip.innerText = t; tip.style.display = 'block'; }
        function hideTip() { tip.style.display = 'none'; }
        document.addEventListener('mousemove', (e) => { tip.style.left = (e.clientX + 15) + 'px'; tip.style.top = (e.clientY - 15) + 'px'; });
    </script>
</body>
</html>
