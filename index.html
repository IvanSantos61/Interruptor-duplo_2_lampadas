<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SMT Pro - Laboratório de Instalação</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html, body { margin: 0; padding: 0; background: #060b13; width: 100%; height: 100vh; overflow: hidden; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { color: white; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* --- TELA DE SPLASH (EXTRUTURA DA GRAVURA) --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #060b13; z-index: 5000;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }
        .moldura-splash {
            width: 850px; height: 480px;
            border: 2px solid #00f0ff; border-radius: 40px;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.4), inset 0 0 20px rgba(0, 240, 255, 0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; text-align: center;
        }
        .splash-h1 { color: #00f0ff; font-size: 48px; letter-spacing: 5px; margin-bottom: 10px; text-shadow: 0 0 20px rgba(0, 240, 255, 0.6); }
        .splash-h2 { color: #00f0ff; font-size: 26px; letter-spacing: 3px; margin-bottom: 40px; }
        .splash-h3 { color: #00f0ff; font-size: 20px; letter-spacing: 4px; margin-bottom: 50px; }
        .splash-footer { color: #445566; font-size: 12px; margin-bottom: 40px; }

        .btn-iniciar {
            background: transparent; border: 2px solid #00f0ff; border-radius: 50px;
            color: #00f0ff; font-size: 16px; font-weight: bold; padding: 15px 40px;
            cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
            animation: pulsarBotao 1.5s infinite ease-in-out;
        }
        @keyframes pulsarBotao { 0%, 100% { opacity: 1; box-shadow: 0 0 20px rgba(0,240,255,0.4); } 50% { opacity: 0.3; box-shadow: 0 0 5px rgba(0,240,255,0.1); } }

        /* --- INTERFACE DO SIMULADOR (OCULTA INICIALMENTE) --- */
        #conteudo-lab { display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; padding: 20px; }
        #painel-status { width: 1000px; padding: 15px; margin-bottom: 15px; border: 1px solid #1a2a44; border-radius: 10px; text-align: center; color: #00f0ff; text-transform: uppercase; }
        #container-simulador { position: relative; width: 1000px; height: 600px; background: url('ambiente.jpg') no-repeat center center; background-size: contain; border: 2px solid #1a2a44; }
        
        /* Estilos de Componentes */
        .camada-cabo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .ponto-conexao { position: absolute; width: 22px; height: 22px; border-radius: 50%; border: 2px solid #fff; z-index: 150; cursor: pointer; display: none; transform: translate(-50%, -50%); }
        .ponto-verde { background: #00ff00 !important; box-shadow: 0 0 15px #00ff00 !important; }
        .alavanca, .tecla { position: absolute; z-index: 110; cursor: pointer; }
        .lampada-acesa { position: absolute; z-index: 105; pointer-events: none; display: none; }
        .conector { position: absolute; z-index: 115; display: none; }
        .hotspot { position: absolute; cursor: help; z-index: 100; }
        .hotspot:hover { border: 1px solid rgba(255, 255, 0, 0.6); background: rgba(255, 255, 0, 0.05); }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="moldura-splash">
            <h1 class="splash-h1">LABORATÓRIO SMT PRO</h1>
            <h2 class="splash-h2">INTERRUPTOR SIMPLES PARA 1 LÂMPADA</h2>
            <h3 class="splash-h3">CIRCUITO MONOFÁSICO - 127V</h3>
            <p class="splash-footer">© Desenvolvido por Ivan Santos - ConectaeadPLUS - 2026</p>
            <button class="btn-iniciar" onclick="iniciarLaboratorio()">Clique para iniciar o laboratório</button>
        </div>
    </div>

    <div id="conteudo-lab">
        <div id="painel-status">MODO DE INSTALAÇÃO: <span id="msg">INICIANDO...</span></div>
        <div id="container-simulador">
            <img id="REDEFASE" class="camada-cabo">
            <img id="REDENEUTRO" class="camada-cabo">
            <img id="FASEINT" class="camada-cabo">
            <img id="JUMP" class="camada-cabo">
            <img id="RETORNO1" class="camada-cabo">
            <img id="RETORNO2" class="camada-cabo">
            <img id="NEUTROL1" class="camada-cabo">
            <img id="NEUTROL2" class="camada-cabo">

            <img id="al-dg" src="al_dg_off.png" class="alavanca" style="top: 27.6%; left: 12%; width: 39.2px;" onclick="toggleDG()">
            <img id="al-dr" src="al_dr_off.png" class="alavanca" style="top: 30%; left: 23.5%; width: 55px;" onclick="toggleDR()">
            <img id="tecla-l1" src="intum_off.png" class="tecla" style="top: 64.5%; left: 57.5%; width: 65px;" onclick="toggleTecla(1)">
            
            <div id="ponto-A" class="ponto-conexao" onclick="cliquePonto('A')"></div>
            <div id="ponto-B" class="ponto-conexao" onclick="cliquePonto('B')"></div>
        </div>
    </div>

    <script>
        // LÓGICA DE TRANSIÇÃO
        function iniciarLaboratorio() {
            const splash = document.getElementById('splash-screen');
            const conteudo = document.getElementById('conteudo-lab');
            
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                conteudo.style.display = 'flex';
                carregarPasso(); // Inicia a lógica do simulador
            }, 800);
        }

        // Restante da sua lógica original de fiação e botões...
        let passoAtivo = 0;
        // ... (Insira aqui as funções carregarPasso, cliquePonto e toggleDG que você já tem)
    </script>
</body>
</html>
