<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SMT Pro - FioCerto</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html, body { margin: 0; padding: 0; background: #060b13; width: 100%; height: 100vh; overflow: hidden; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { color: white; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; }

        /* --- INTERFACE --- */
        #conteudo-lab { display: none; flex-direction: column; align-items: center; width: 100%; padding-top: 30px; }
        .titulo-principal { color: #00f0ff; font-size: 38px; letter-spacing: 4px; text-shadow: 0 0 15px rgba(0, 240, 255, 0.8); margin-bottom: 30px; text-transform: uppercase; }
        #painel-status { width: 850px; height: 100px; background: #060b13; border: 1px solid #1a2a44; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; padding: 0 40px; }
        #msg { color: #ff8c00; font-size: 16px; font-weight: bold; text-align: center; text-transform: uppercase; }
        #container-simulador { position: relative; width: 1000px; height: 600px; background: url('ambiente.jpg') no-repeat center center; background-size: contain; border: 1px solid #1a2a44; }

        /* --- NOVO QUADRO DE STATUS (IGUAL À GRAVURA) --- */
        #quadro-status-dispositivos {
            position: absolute; top: 275px; left: 620px; width: 220px;
            background: rgba(6, 11, 19, 0.95); border: 2px solid #00f0ff; border-radius: 8px;
            padding: 10px; display: none; flex-direction: column; gap: 8px; z-index: 300;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }
        .header-status { background: #00f0ff; color: #060b13; font-size: 11px; font-weight: bold; text-align: center; padding: 4px; border-radius: 4px; letter-spacing: 1px; }
        .linha-status { display: flex; justify-content: space-between; align-items: center; border: 1px solid #1a2a44; padding: 5px 12px; border-radius: 4px; }
        .label-status { font-size: 13px; color: #fff; font-weight: bold; }
        .ind-off { color: #ff0000; font-weight: bold; text-shadow: 0 0 5px #ff0000; }
        .ind-on { color: #00ff00; font-weight: bold; text-shadow: 0 0 10px #00ff00; }

        /* --- ELEMENTOS TÉCNICOS --- */
        .camada-cabo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .ponto-conexao { position: absolute; width: 22px; height: 22px; border-radius: 50%; border: 2px solid #fff; z-index: 150; cursor: pointer; display: none; transform: translate(-50%, -50%); }
        .ponto-verde { background: #00ff00 !important; box-shadow: 0 0 15px #00ff00 !important; }
        .alavanca, .tecla { position: absolute; z-index: 110; cursor: pointer; }
        .lampada-acesa { position: absolute; z-index: 105; pointer-events: none; display: none; }
        .conector { position: absolute; z-index: 115; display: none; }
        .hotspot { position: absolute; cursor: help; z-index: 100; background: transparent; }
        .hotspot:hover { border: 1px solid rgba(255, 255, 0, 0.6); background: rgba(255, 255, 0, 0.05); }

        /* --- MODAIS E BOTÕES --- */
        .modal-ajuda-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 3000; display: none; align-items: center; justify-content: center; }
        .container-lista-ajuda { width: 450px; background: #060b13; border: 2px solid #00f0ff; border-radius: 15px; padding: 30px; text-align: center; }
        .item-ajuda { background: #111a27; border: 1px solid #1a2a44; color: #fff; padding: 15px; margin-bottom: 10px; border-radius: 5px; cursor: pointer; text-align: left; font-size: 13px; }
        #modal-ver-imagem { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #img-tecnica-ajuda { max-width: 85%; max-height: 80%; border: 2px solid #00f0ff; border-radius: 10px; cursor: pointer; }
        .btn-acao { position: absolute; width: 140px; padding: 10px; border-radius: 20px; border: none; font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: bold; cursor: pointer; color: white; z-index: 200; }
        .btn-ajuda { top: 485px; left: 120px; background: #1a2a44; border: 1px solid #00f0ff; }
        .btn-reiniciar { top: 535px; left: 120px; background: #cc0000; }
        #tooltip { position: fixed; background: rgba(255, 255, 0, 0.95); color: #060b13; padding: 6px 12px; border-radius: 4px; font-size: 13px; font-weight: bold; pointer-events: none; display: none; z-index: 2000; border: 1px solid #fff; }
    </style>
</head>
<body>

    <div id="tooltip"></div>

    <div id="modal-ajuda" class="modal-ajuda-overlay">
        <div class="container-lista-ajuda">
            <h2 style="color: #ffcc00; margin-bottom: 20px;">AJUDA TÉCNICO</h2>
            <div class="item-ajuda" onclick="abrirImagem('ligacaoint2P.png')">1. Ligação do Interruptor</div>
            <div class="item-ajuda" onclick="abrirImagem('ligabocal.png')">2. Ligação das Lâmpadas</div>
            <div class="item-ajuda" onclick="iniciarCicloItem3()">3. Emendas e conexões</div>
            <div class="item-ajuda" onclick="abrirImagem('moldura.png')">4. Lista de material</div>
            <button style="margin-top:20px; padding:10px 20px; cursor:pointer;" onclick="fecharAjuda()">FECHAR</button>
        </div>
    </div>

    <div id="modal-ver-imagem">
        <img id="img-tecnica-ajuda" src="" onclick="handleImageClick()">
        <p id="hint-toggle" style="color:#00f0ff; margin-top:10px; display:none;">(Clique na imagem para alternar)</p>
        <button style="margin-top:30px; padding:10px 30px; background:#00f0ff; color:#000; font-weight:bold; cursor:pointer;" onclick="voltarParaLista()">VOLTAR</button>
    </div>

    <div id="splash-screen" style="position:fixed; width:100%; height:100%; background:#060b13; z-index:5000; display:flex; align-items:center; justify-content:center;">
        <button style="padding:20px 40px; border:2px solid #00f0ff; background:transparent; color:#00f0ff; font-family:'Orbitron'; cursor:pointer;" onclick="iniciarLaboratorio()">INICIAR LABORATÓRIO</button>
    </div>

    <div id="conteudo-lab">
        <h1 class="titulo-principal">LABORATÓRIO SMT PRO</h1>
        <div id="painel-status"><div id="msg">AGUARDANDO INÍCIO...</div></div>

        <div id="container-simulador">
            <div id="quadro-status-dispositivos">
                <div class="header-status">STATUS DO CIRCUITO</div>
                <div class="linha-status"><span class="label-status">DG</span><span id="st-dg" class="ind-off">X</span></div>
                <div class="linha-status"><span class="label-status">DR</span><span id="st-dr" class="ind-off">X</span></div>
                <div class="linha-status"><span class="label-status">INT</span><span id="st-int" class="ind-off">X</span></div>
            </div>

            <button class="btn-acao btn-ajuda" onclick="abrirAjuda()">AJUDA</button>
            <button class="btn-acao btn-reiniciar" onclick="location.reload()">REINICIAR</button>

            <div class="hotspot" style="top: 12%; left: 6%; width: 35px; height: 200px;" onmouseover="showTip('BARRA DE ATERRAMENTO')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 15%; left: 12%; width: 45px; height: 150px;" onmouseover="showTip('DISJUNTOR GERAL')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 15%; left: 15.6%; width: 40px; height: 153px;" onmouseover="showTip('DPS')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 15%; left: 19.5%; width: 90px; height: 161px;" onmouseover="showTip('DISPOSITIVO DR')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 15%; left: 28.5%; width: 115px; height: 152px;" onmouseover="showTip('DISJUNTORES')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 12%; left: 42.6%; width: 35px; height: 200px;" onmouseover="showTip('BARRA DE NEUTRO')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 55%; left: 6%; width: 45px; height: 130px;" onmouseover="showTip('REDE ELÉTRICA')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 58%; left: 27.5%; width: 130px; height: 180px;" onmouseover="showTip('CAIXA 4x2')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 13%; left: 54.5%; width: 130px; height: 180px;" onmouseover="showTip('CAIXA 4x2')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 13%; left: 70.5%; width: 130px; height: 180px;" onmouseover="showTip('CAIXA 4x2')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 13%; left: 86.5%; width: 130px; height: 180px;" onmouseover="showTip('CAIXA 4x2')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 56%; left: 57%; width: 70px; height: 160px;" onmouseover="showTip('INTERRUPTOR')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 60%; left: 73%; width: 40px; height: 48px;" onmouseover="showTip('BOCAL E27')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 67%; left: 71.7%; width: 66px; height: 85px;" onmouseover="showTip('LÂMPADA LED')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 60%; left: 89.3%; width: 40px; height: 48px;" onmouseover="showTip('BOCAL E27')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 67%; left: 88.2%; width: 66px; height: 85px;" onmouseover="showTip('LÂMPADA LED')" onmouseout="hideTip()"></div>

            <img id="REDEFASE" class="camada-cabo"><img id="REDENEUTRO" class="camada-cabo">
            <img id="FASEINT" class="camada-cabo"><img id="JUMP" class="camada-cabo">
            <img id="RETORNO1" class="camada-cabo"><img id="RETORNO2" class="camada-cabo">
            <img id="NEUTROL1" class="camada-cabo"><img id="NEUTROL2" class="camada-cabo">

            <img id="con-fase" src="con_derivacao.png" class="conector" style="top: 14%; left: 57%; width: 40px;">
            <img id="con-neutro1" src="con_derivacao.png" class="conector" style="top: 11.4%; left: 75.7%; width: 40px;">
            <img id="con-neutro2" src="con_derivacao.png" class="conector" style="top: 11.4%; left: 92%; width: 40px;">

            <img id="al-dg" src="al_dg_off.png" class="alavanca" style="top: 27.6%; left: 12%; width: 39.2px;" onclick="toggleDG()">
            <img id="al-dr" src="al_dr_off.png" class="alavanca" style="top: 30%; left: 23.5%; width: 55px;" onclick="toggleDR()">
            <img id="tecla-l1" src="intum_off.png" class="tecla" style="top: 64.5%; left: 57.5%; width: 65px;" onclick="toggleTecla(1)">
            <img id="tecla-l2" src="intdois_off.png" class="tecla" style="top: 68.9%; left: 57.5%; width: 65px;" onclick="toggleTecla(2)">
            <img id="lamp1-on" src="lamp_on.png" class="lampada-acesa" style="top: 60.5%; left: 66.6%; width: 170px;">
            <img id="lamp2-on" src="lamp_on.png" class="lampada-acesa" style="top: 60.5%; left: 82.9%; width: 170px;">

            <div id="ponto-A" class="ponto-conexao" onclick="cliquePonto('A')"></div>
            <div id="ponto-B" class="ponto-conexao" onclick="cliquePonto('B')"></div>
        </div>
    </div>

    <script>
        let isToggleItem3 = false;
        let passoAtivo = 0, pA_ok = false, dgLigado = false, drLigado = false, tecla1Ligada = false, tecla2Ligada = false;

        const coordenadasInstalacao = [
            { id: 'REDEFASE',   cor: 'red',    a: { top: 38, left: 26 }, b: { top: 17, left: 99 } },
            { id: 'REDENEUTRO', cor: 'blue',   a: { top: 35, left: 44.5}, b: { top: 14, left: 99 } },
            { id: 'FASEINT',    cor: 'red',    a: { top: 19, left: 60 }, b: { top: 67, left: 58 } },
            { id: 'JUMP',       cor: 'red',    a: { top: 68, left: 56 }, b: { top: 72, left: 58 } },
            { id: 'RETORNO1',   cor: 'yellow', a: { top: 68, left: 64 }, b: { top: 55, left: 89.7 } },
            { id: 'RETORNO2',   cor: 'yellow', a: { top: 73, left: 64 }, b: { top: 55, left: 75 } },
            { id: 'NEUTROL1',   cor: 'blue',   a: { top: 15, left: 77.2 }, b: { top: 55, left: 75 } },
            { id: 'NEUTROL2',   cor: 'blue',   a: { top: 15, left: 93.2 }, b: { top: 56, left: 91.5 } }
        ];

        function iniciarLaboratorio() {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('conteudo-lab').style.display = 'flex';
            carregarPasso();
        }

        function carregarPasso() {
            if (passoAtivo >= coordenadasInstalacao.length) {
                document.getElementById('msg').innerHTML = "FIAÇÃO CONCLUÍDA! TESTE O CIRCUITO.";
                document.getElementById('ponto-A').style.display = 'none';
                document.getElementById('ponto-B').style.display = 'none';
                document.getElementById('quadro-status-dispositivos').style.display = 'flex'; // Surge no final
                verificarEnergia();
                return;
            }
            const item = coordenadasInstalacao[passoAtivo];
            if (item.id === 'FASEINT') document.getElementById('con-fase').style.display = 'block';
            else if (item.id === 'NEUTROL1') document.getElementById('con-neutro1').style.display = 'block';
            else if (item.id === 'NEUTROL2') document.getElementById('con-neutro2').style.display = 'block';

            document.getElementById('msg').innerHTML = `CONECTAR ${item.id}`;
            const pA = document.getElementById('ponto-A');
            pA.style.top = item.a.top + "%"; pA.style.left = item.a.left + "%";
            pA.style.backgroundColor = item.cor;
            pA.style.display = "block";
            pA_ok = false;
        }

        function cliquePonto(tipo) {
            if (tipo === 'A') { pA_ok = true; document.getElementById('ponto-A').classList.add('ponto-verde'); document.getElementById('ponto-B').style.display = "block"; 
                const item = coordenadasInstalacao[passoAtivo];
                const pB = document.getElementById('ponto-B');
                pB.style.top = item.b.top + "%"; pB.style.left = item.b.left + "%";
                pB.style.backgroundColor = item.cor;
            }
            else if (tipo === 'B' && pA_ok) { processarCabo(); }
        }

        async function processarCabo() {
            const id = coordenadasInstalacao[passoAtivo].id;
            const img = document.getElementById(id);
            for (let i = 1; i <= 20; i++) { // Simulação de fiação
                img.style.opacity = i/20;
                await new Promise(r => setTimeout(r, 30));
            }
            passoAtivo++;
            carregarPasso();
        }

        function toggleDG() { dgLigado = !dgLigado; document.getElementById('al-dg').src = dgLigado ? 'al_dg_on.png' : 'al_dg_off.png'; verificarEnergia(); }
        function toggleDR() { drLigado = !drLigado; document.getElementById('al-dr').src = drLigado ? 'al_dr_on.png' : 'al_dr_off.png'; verificarEnergia(); }
        function toggleTecla(num) {
            if (num === 1) { tecla1Ligada = !tecla1Ligada; document.getElementById('tecla-l1').src = tecla1Ligada ? 'intum_on.png' : 'intum_off.png'; }
            else { tecla2Ligada = !tecla2Ligada; document.getElementById('tecla-l2').src = tecla2Ligada ? 'intdois_on.png' : 'intdois_off.png'; }
            verificarEnergia();
        }

        function verificarEnergia() {
            const energia = dgLigado && drLigado && passoAtivo >= coordenadasInstalacao.length;
            document.getElementById('lamp1-on').style.display = (energia && tecla1Ligada) ? 'block' : 'none';
            document.getElementById('lamp2-on').style.display = (energia && tecla2Ligada) ? 'block' : 'none';
            
            // Atualiza Quadro de Status
            atualizarIcone('st-dg', dgLigado);
            atualizarIcone('st-dr', drLigado);
            atualizarIcone('st-int', (tecla1Ligada || tecla2Ligada));
        }

        function atualizarIcone(id, ligado) {
            const el = document.getElementById(id);
            el.innerText = ligado ? "OK" : "X";
            el.className = ligado ? "ind-on" : "ind-off";
        }

        // HELPERS AJUDA
        function abrirAjuda() { document.getElementById('modal-ajuda').style.display = 'flex'; }
        function fecharAjuda() { document.getElementById('modal-ajuda').style.display = 'none'; }
        function abrirImagem(url) { isToggleItem3 = false; document.getElementById('modal-ajuda').style.display = 'none'; document.getElementById('img-tecnica-ajuda').src = url; document.getElementById('hint-toggle').style.display = 'none'; document.getElementById('modal-ver-imagem').style.display = 'flex'; }
        function iniciarCicloItem3() { isToggleItem3 = true; document.getElementById('modal-ajuda').style.display = 'none'; document.getElementById('img-tecnica-ajuda').src = 'conectder_open.png'; document.getElementById('hint-toggle').style.display = 'block'; document.getElementById('modal-ver-imagem').style.display = 'flex'; }
        function handleImageClick() { if (isToggleItem3) { const img = document.getElementById('img-tecnica-ajuda'); img.src = img.src.includes('open') ? 'conectder_close.png' : 'conectder_open.png'; } }
        function voltarParaLista() { document.getElementById('modal-ver-imagem').style.display = 'none'; document.getElementById('modal-ajuda').style.display = 'flex'; }

        const tip = document.getElementById('tooltip');
        function showTip(t) { tip.innerText = t; tip.style.display = 'block'; }
        function hideTip() { tip.style.display = 'none'; }
        document.addEventListener('mousemove', (e) => { tip.style.left = (e.clientX + 15) + 'px'; tip.style.top = (e.clientY - 15) + 'px'; });
    </script>
</body>
</html>
