<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SMT Pro - FioCerto</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html, body { margin: 0; padding: 0; background: #060b13; width: 100%; height: 100vh; overflow: hidden; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { color: white; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; }

        /* --- TELA DE SPLASH --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #060b13; z-index: 5000;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.6s ease;
        }
        .moldura-splash {
            width: 900px; height: 500px;
            border: 2px solid #00f0ff; border-radius: 30px;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.4), inset 0 0 20px rgba(0, 240, 255, 0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; background: #060b13;
        }
        .splash-h1 { color: #00f0ff; font-size: 45px; letter-spacing: 5px; margin-bottom: 10px; text-shadow: 0 0 20px rgba(0, 240, 255, 0.6); }
        .splash-h2 { color: #00f0ff; font-size: 24px; letter-spacing: 2px; margin-bottom: 15px; }
        .splash-h3 { color: #00f0ff; font-size: 18px; letter-spacing: 3px; margin-bottom: 50px; opacity: 0.8; }
        .splash-footer { color: #334455; font-size: 11px; margin-bottom: 40px; font-family: sans-serif; }

        .btn-iniciar {
            background: transparent; border: 2px solid #00f0ff; border-radius: 50px;
            color: #00f0ff; font-size: 15px; font-weight: bold; padding: 14px 45px;
            cursor: pointer; text-transform: uppercase; font-family: 'Orbitron', sans-serif;
            animation: piscar 1.8s infinite ease-in-out;
        }
        @keyframes piscar { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* --- INTERFACE PRINCIPAL --- */
        #conteudo-lab { 
            display: none; flex-direction: column; align-items: center; width: 100%; padding-top: 30px; 
            border: none !important; outline: none !important; /* Garantia extra */
        }
        
        .titulo-principal {
            color: #00f0ff; font-size: 38px; letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.8);
            margin-bottom: 30px; text-transform: uppercase;
        }

        #painel-status { 
            width: 850px; height: 100px;
            background: #060b13; border: 1px solid #1a2a44; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 30px; box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            padding: 0 40px;
        }

        #msg { color: #ff8c00; font-size: 16px; font-weight: bold; text-align: center; text-transform: uppercase; line-height: 1.4; }
        .prefixo-rede { color: #ff0000; margin-right: 5px; }

        /* CONTAINER SEM MOLDURA */
        #container-simulador { 
            position: relative; width: 1000px; height: 600px; 
          /*   background: url('ambiente.jpg') no-repeat center center; */
            background: #222;
            background-size: contain; 
            border: none !important; /* Remove a moldura indicada pelas setas */
            outline: none !important;
            box-shadow: none !important;
        }

        .controles-inferiores { position: absolute; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 200; }
        .btn-acao { width: 140px; padding: 10px; border-radius: 20px; border: none; font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; color: white; }
        .btn-ajuda { background: #1a2a44; border: 1px solid #00f0ff; cursor: wait; opacity: 0.8; }
        .btn-reiniciar { background: #cc0000; box-shadow: 0 4px #800000; }

        /* Elementos Técnicos */
        .camada-cabo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: block; }
        .ponto-conexao { position: absolute; width: 22px; height: 22px; border-radius: 50%; border: 2px solid #fff; z-index: 150; cursor: pointer; display: none; transform: translate(-50%, -50%); }
        .ponto-verde { background: #00ff00 !important; box-shadow: 0 0 15px #00ff00 !important; }
        .hotspot { position: absolute; cursor: help; z-index: 100; background: transparent; }
        
        #tooltip { position: fixed; background: rgba(255, 255, 0, 0.95); color: #060b13; padding: 6px 12px; border-radius: 4px; font-size: 13px; font-weight: bold; pointer-events: none; display: none; z-index: 2000; border: 1px solid #fff; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="tooltip"></div>

    <div id="splash-screen">
        <div class="moldura-splash">
            <h1 class="splash-h1">LABORATÓRIO SMT PRO</h1>
            <h2 class="splash-h2">INTERRUPTOR SIMPLES PARA 2 LÂMPADAS</h2>
            <h3 class="splash-h3">CIRCUITO MONOFÁSICO - 127V</h3>
            <p class="splash-footer">© Desenvolvido por Ivan Santos - ConectaeadPLUS - 2026</p>
            <button class="btn-iniciar" onclick="iniciarLaboratorio()">Clique para iniciar o laboratório</button>
        </div>
    </div>

    <div id="conteudo-lab">
        <h1 class="titulo-principal">LABORATÓRIO SMT PRO</h1>

        <div id="painel-status">
            <div id="msg"><span class="prefixo-rede">REDE:</span> AGUARDANDO INÍCIO...</div>
        </div>

        <div id="container-simulador">
            <div class="controles-inferiores">
                <button class="btn-acao btn-ajuda">AJUDA</button>
                <button class="btn-acao btn-reiniciar" onclick="reiniciarFluxo()">REINICIAR</button>
            </div>

            <div class="hotspot" style="top: 12%; left: 6%; width: 35px; height: 200px;" onmouseover="showTip('BARRA DE ATERRAMENTO')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 15%; left: 12%; width: 45px; height: 150px;" onmouseover="showTip('DISJUNTOR GERAL')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 15%; left: 15.6%; width: 40px; height: 153px;" onmouseover="showTip('DPS (PROTETOR DE SURTO)')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 15%; left: 19.5%; width: 90px; height: 161px;" onmouseover="showTip('DISPOSITIVO DR')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 15%; left: 28.5%; width: 115px; height: 152px;" onmouseover="showTip('DISJUNTORES DOS CIRCUITOS')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 12%; left: 42.6%; width: 35px; height: 200px;" onmouseover="showTip('BARRA DE NEUTRO')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 55%; left: 6%; width: 45px; height: 130px;" onmouseover="showTip('REDE ELÉTRICA')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 58%; left: 27.5%; width: 130px; height: 180px;" onmouseover="showTip('CAIXA DE PASSAGEM 4x2')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 13%; left: 54.5%; width: 130px; height: 180px;" onmouseover="showTip('CAIXA DE PASSAGEM 4x2')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 13%; left: 70.5%; width: 130px; height: 180px;" onmouseover="showTip('CAIXA DE PASSAGEM 4x2')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 13%; left: 86.5%; width: 130px; height: 180px;" onmouseover="showTip('CAIXA DE PASSAGEM 4x2')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 56%; left: 57%; width: 70px; height: 160px;" onmouseover="showTip('INTERRUPTOR 2 SEÇÕES')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 60%; left: 73%; width: 40px; height: 48px;" onmouseover="showTip('BOCAL E27')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 67%; left: 71.7%; width: 66px; height: 85px;" onmouseover="showTip('LÂMPADA LED 127V')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 60%; left: 89.3%; width: 40px; height: 48px;" onmouseover="showTip('BOCAL E27')" onmouseout="hideTip()"></div>
            <div class="hotspot" style="top: 67%; left: 88.2%; width: 66px; height: 85px;" onmouseover="showTip('LÂMPADA LED 127V')" onmouseout="hideTip()"></div>

            <img id="REDEFASE" class="camada-cabo">
            <img id="REDENEUTRO" class="camada-cabo">
            <img id="FASEINT" class="camada-cabo">
            <img id="JUMP" class="camada-cabo">
            <img id="RETORNO1" class="camada-cabo">
            <img id="RETORNO2" class="camada-cabo">
            <img id="NEUTROL1" class="camada-cabo">
            <img id="NEUTROL2" class="camada-cabo">

            <div id="ponto-A" class="ponto-conexao" onclick="cliquePonto('A')"></div>
            <div id="ponto-B" class="ponto-conexao" onclick="cliquePonto('B')"></div>
        </div>
    </div>

    <script>
        const coordenadasInstalacao = [
            { id: 'REDEFASE',   cor: 'red',    a: { top: 38, left: 26 }, b: { top: 17, left: 99 } },
            { id: 'REDENEUTRO', cor: 'blue',   a: { top: 35, left: 44.5}, b: { top: 14, left: 99 } },
            { id: 'FASEINT',    cor: 'red',    a: { top: 19, left: 60 }, b: { top: 67, left: 58 } },
            { id: 'JUMP',       cor: 'red',    a: { top: 68, left: 56 }, b: { top: 72, left: 58 } },
            { id: 'RETORNO1',   cor: 'yellow', a: { top: 68, left: 64 }, b: { top: 55, left: 89.7 } },
            { id: 'RETORNO2',   cor: 'yellow', a: { top: 73, left: 64 }, b: { top: 55, left: 75 } },
            { id: 'NEUTROL1',   cor: 'blue',   a: { top: 15, left: 77.2 }, b: { top: 55, left: 75 } },
            { id: 'NEUTROL2',   cor: 'blue',   a: { top: 15, left: 93.2 }, b: { top: 56, left: 91.5 } }
        ];

        let passoAtivo = 0;
        let pA_ok = false;
        const totalFrames = { REDEFASE: 96, REDENEUTRO: 115, FASEINT: 43, JUMP: 10, RETORNO1: 54, RETORNO2: 45, NEUTROL1: 25, NEUTROL2: 25 };

        function iniciarLaboratorio() {
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('conteudo-lab').style.display = 'flex';
                carregarPasso();
            }, 600);
        }

        function reiniciarFluxo() { location.reload(); }

        function carregarPasso() {
            if (passoAtivo >= coordenadasInstalacao.length) {
                document.getElementById('msg').innerHTML = "<span class='prefixo-rede'>REDE:</span> MONTAGEM CONCLUÍDA!";
                document.getElementById('ponto-A').style.display = 'none';
                document.getElementById('ponto-B').style.display = 'none';
                return;
            }
            const item = coordenadasInstalacao[passoAtivo];
            document.getElementById('msg').innerHTML = `<span class='prefixo-rede'>REDE:</span> CLIQUE NA REFERÊNCIA INDICADA PARA CONECTAR ${item.id}`;
            const pA = document.getElementById('ponto-A');
            pA.style.top = item.a.top + "%"; pA.style.left = item.a.left + "%";
            pA.classList.remove('ponto-verde'); pA.style.backgroundColor = item.cor; pA.style.display = "block";
            const pB = document.getElementById('ponto-B');
            pB.style.top = item.b.top + "%"; pB.style.left = item.b.left + "%";
            pB.classList.remove('ponto-verde'); pB.style.backgroundColor = item.cor; pB.style.display = "none";
            pA_ok = false;
        }

        function cliquePonto(tipo) {
            if (tipo === 'A') { pA_ok = true; document.getElementById('ponto-A').classList.add('ponto-verde'); document.getElementById('ponto-B').style.display = "block"; }
            else if (tipo === 'B' && pA_ok) { document.getElementById('ponto-B').classList.add('ponto-verde'); processarCabo(); }
        }

        async function processarCabo() {
            const id = coordenadasInstalacao[passoAtivo].id;
            const img = document.getElementById(id);
            for (let i = 1; i <= totalFrames[id]; i++) {
                img.src = `${id}/quadro${String(i).padStart(3, '0')}.png`;
                await new Promise(r => setTimeout(r, 20));
            }
            passoAtivo++;
            setTimeout(carregarPasso, 500);
        }

        const tip = document.getElementById('tooltip');
        function showTip(t) { tip.innerText = t; tip.style.display = 'block'; }
        function hideTip() { tip.style.display = 'none'; }
        document.addEventListener('mousemove', (e) => { tip.style.left = (e.clientX + 15) + 'px'; tip.style.top = (e.clientY - 15) + 'px'; });
    </script>
</body>
</html>
