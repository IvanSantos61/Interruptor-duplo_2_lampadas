<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SMT Pro - Controle de Proteção</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #060b13; 
            color: white; 
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        #painel-status {
            width: 100%; max-width: 1000px; padding: 15px; text-align: center;
            color: #00f0ff; text-shadow: 0 0 10px #00f0ff; font-size: 1.2em;
        }

        #container-simulador { 
            position: relative; 
            width: 1000px; height: 600px; 
            background: url('ambiente.jpg') no-repeat center center;
            background-size: contain;
        }

        .camada-cabo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

        /* Estilo para as Alavancas do DG e DR */
        .alavanca {
            position: absolute;
            z-index: 120;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .alavanca:active { transform: scale(0.9); }

        /* Hotspots dos Interruptores S1 e S2 continuam aqui */
        .tecla-s { position: absolute; z-index: 100; cursor: pointer; border: 1px dashed rgba(0, 240, 255, 0.2); }
    </style>
</head>
<body>

    <div id="painel-status">SISTEMA SMT: <span id="msg">AGUARDANDO COMANDO</span></div>

    <div id="container-simulador">
        <img id="REDEFASE" class="camada-cabo">
        <img id="REDENEUTRO" class="camada-cabo">
        <img id="FASEINT" class="camada-cabo">
        <img id="JUMP" class="camada-cabo">
        <img id="RETORNO1" class="camada-cabo">
        <img id="RETORNO2" class="camada-cabo">
        <img id="NEUTROL1" class="camada-cabo">
        <img id="NEUTROL2" class="camada-cabo">

        <img id="al-dg" src="al_dg_off.png" class="alavanca" style="top: 25%; left: 12%; width: 30px;" onclick="toggleDG()">
        <img id="al-dr" src="al_dr_off.png" class="alavanca" style="top: 25%; left: 18%; width: 55px;" onclick="toggleDR()">

        <div class="tecla-s" style="top: 45%; left: 44%; width: 35px; height: 55px;" onclick="acionarLampada(1)"></div>
        <div class="tecla-s" style="top: 45%; left: 49%; width: 35px; height: 55px;" onclick="acionarLampada(2)"></div>
    </div>

    <script>
        const seq = { REDEFASE: 96, REDENEUTRO: 115, FASEINT: 43, JUMP: 10, RETORNO1: 54, RETORNO2: 45, NEUTROL1: 25, NEUTROL2: 20 };
        
        let dgOn = false;
        let drOn = false;

        async function carregarTudo() {
            for (let id in seq) {
                const img = document.getElementById(id);
                for (let i = 1; i <= seq[id]; i++) {
                    img.src = `${id}/quadro${String(i).padStart(3, '0')}.png`;
                }
            }
            document.getElementById('msg').innerText = "FIAÇÃO CARREGADA. LIGUE O DG E O DR.";
        }

        function toggleDG() {
            dgOn = !dgOn;
            document.getElementById('al-dg').src = dgOn ? 'al_dg_on.png' : 'al_dg_off.png';
            atualizarEnergia();
        }

        function toggleDR() {
            drOn = !drOn;
            document.getElementById('al-dr').src = drOn ? 'al_dr_on.png' : 'al_dr_off.png';
            atualizarEnergia();
        }

        function atualizarEnergia() {
            const msg = document.getElementById('msg');
            if (dgOn && drOn) {
                msg.innerHTML = "<span style='color:#00ff00'>SISTEMA ENERGIZADO</span>";
            } else if (dgOn && !drOn) {
                msg.innerHTML = "<span style='color:#ffcc00'>LIGUE O DR PARA LIBERAR TENSÃO</span>";
            } else {
                msg.innerHTML = "<span style='color:#ff0000'>SISTEMA DESLIGADO</span>";
            }
        }

        function acionarLampada(n) {
            if (!dgOn || !drOn) {
                alert("Sem energia! Verifique o DG e o DR.");
                return;
            }
            document.getElementById('msg').innerText = `LÂMPADA ${n} ACIONADA`;
        }

        window.onload = carregarTudo;
    </script>
</body>
</html>
