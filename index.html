<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Laboratório SMT Pro - Duplo</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Estilo base replicado do seu Laboratório */
        body { 
            font-family: 'Segoe UI', sans-serif; background: #060b13; color: white; 
            display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px;
        }

        h1 { font-family: 'Orbitron'; color: #00f0ff; text-shadow: 0 0 15px #00f0ff; text-transform: uppercase; }

        /* Container do Simulador */
        #container-simulador { 
            position: relative; line-height: 0; border: 2px solid #1a2a44; 
            border-radius: 10px; overflow: hidden; background: #000;
        }

        #fundo { max-width: 1000px; height: auto; display: block; opacity: 0.8; }

        /* Camadas de Imagens dos Cabos */
        .camada-cabo { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; display: none; /* Começam ocultas */
        }

        /* Áreas de Clique (Hotspots das Teclas) */
        .tecla-hotspot {
            position: absolute; z-index: 100; cursor: pointer;
            border: 1px dashed rgba(0, 240, 255, 0.2);
        }
        .tecla-hotspot:hover { background: rgba(0, 240, 255, 0.1); border-color: #00f0ff; }

        /* Painel de Status */
        #painel-status {
            width: 90%; max-width: 1000px; background: rgba(0,0,0,0.5);
            border: 1px solid #1a2a44; padding: 20px; margin-bottom: 20px;
            font-family: 'Orbitron'; text-align: center; border-radius: 15px;
        }

        .status-on { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
        .status-off { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
    </style>
</head>
<body>

    <h1>LABORATÓRIO SMT PRO</h1>

    <div id="painel-status">
        <div id="status-mensagem">AGUARDANDO ENERGIZAÇÃO...</div>
    </div>

    <div id="container-simulador">
        <img src="ambiente.jpg" id="fundo">

        <img id="REDEFASE" class="camada-cabo">
        <img id="REDENEUTRO" class="camada-cabo">
        <img id="FASEINT" class="camada-cabo">
        <img id="JUMP" class="camada-cabo">
        
        <img id="RETORNO1" class="camada-cabo">
        <img id="RETORNO2" class="camada-cabo">
        <img id="NEUTROL1" class="camada-cabo">
        <img id="NEUTROL2" class="camada-cabo">

        <div class="tecla-hotspot" style="top: 48%; left: 45%; width: 35px; height: 50px;" onclick="acionar(1)"></div>
        <div class="tecla-hotspot" style="top: 48%; left: 50%; width: 35px; height: 50px;" onclick="acionar(2)"></div>
    </div>

    <script>
        const totais = {
            REDEFASE: 96, REDENEUTRO: 115, FASEINT: 43, JUMP: 10,
            RETORNO1: 54, RETORNO2: 45, NEUTROL1: 25, NEUTROL2: 20
        };

        // Função para animar a distribuição
        async function rodarSequencia(id) {
            const img = document.getElementById(id);
            img.style.display = "block"; // Torna a camada visível
            
            for (let i = 1; i <= totais[id]; i++) {
                let frame = String(i).padStart(3, '0');
                img.src = `${id}/quadro${frame}.png`;
                await new Promise(r => setTimeout(r, 20)); // Velocidade da fiação
            }
        }

        // Lógica de acionamento independente
        let estado = { s1: false, s2: false };

        async function acionar(n) {
            const msg = document.getElementById('status-mensagem');
            
            if (n === 1) {
                estado.s1 = !estado.s1;
                if (estado.s1) {
                    msg.innerHTML = "CIRCUITO 1: <span class='status-on'>LIGADO</span>";
                    rodarSequencia('NEUTROL1');
                    await rodarSequencia('RETORNO1');
                } else {
                    msg.innerHTML = "CIRCUITO 1: <span class='status-off'>DESLIGADO</span>";
                    document.getElementById('RETORNO1').style.display = "none";
                    document.getElementById('NEUTROL1').style.display = "none";
                }
            } else {
                estado.s2 = !estado.s2;
                if (estado.s2) {
                    msg.innerHTML = "CIRCUITO 2: <span class='status-on'>LIGADO</span>";
                    rodarSequencia('NEUTROL2');
                    await rodarSequencia('RETORNO2');
                } else {
                    msg.innerHTML = "CIRCUITO 2: <span class='status-off'>DESLIGADO</span>";
                    document.getElementById('RETORNO2').style.display = "none";
                    document.getElementById('NEUTROL2').style.display = "none";
                }
            }
        }

        // Inicialização automática
        window.onload = async () => {
            document.getElementById('status-mensagem').innerText = "INSTALANDO REDE ELÉTRICA...";
            await rodarSequencia('REDEFASE');
            await rodarSequencia('REDENEUTRO');
            await rodarSequencia('FASEINT');
            await rodarSequencia('JUMP');
            document.getElementById('status-mensagem').innerText = "SISTEMA PRONTO: ACIONE OS INTERRUPTORES";
        };
    </script>
</body>
</html>
